<script>
    const socket = io();
    let categories = [];
    let allSongs = [];
    let sceneActive = false;
    let currentPoll = null;
    let hasVoted = false; // Frontend kontrolü

    // SUNUCUDAN VERİLERİ AL
    socket.on('init_data', (data) => {
        categories = data.categories || [];
        allSongs = data.songs || [];
        // Menülerin render fonksiyonlarını burada tetikle (Örn: renderCategories)
    });

    socket.on('oy_onaylandi', () => {
        hasVoted = true;
        alert("Oyunuz başarıyla kaydedildi!");
    });

    socket.on('oy_reddedildi', (msg) => {
        alert(msg);
    });

    // VERİYİ SUNUCUYA KAYDET (Her değişiklikten sonra çağır)
    function saveData() {
        const data = { categories, songs: allSongs };
        socket.emit('update_repertuar', data);
        // Localstorage yedeği (Opsiyonel)
        localStorage.setItem('rep_cats', JSON.stringify(categories));
        localStorage.setItem('rep_songs', JSON.stringify(allSongs));
    }

    // Sahne Yönetimi
    function startScene() {
        socket.emit('sahne_durumu_degistir', true);
        closeAdmin();
    }

    function stopScene() {
        if(confirm("Sahne bitirilsin mi?")) {
            socket.emit('sahne_durumu_degistir', false);
            socket.emit('anketi_bitir_sinyali', null);
        }
    }

    // Kategori Silme (Mevcut mantık korundu, saveData eklendi)
    function deleteCat(catId) {
        categories = categories.filter(c => c.id !== catId);
        allSongs = allSongs.map(s => (s.catId === catId ? { ...s, catId: null } : s));
        saveData(); // Sunucuya gönder
        renderCategories();
    }

    // ... Diğer render ve menü fonksiyonların (Mevcut haliyle kalabilir) ...
</script>
