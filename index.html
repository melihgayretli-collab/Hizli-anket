<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Anket - Yönetim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --info: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --dark: #0f172a;
            --input-bg: #1e293b; --main-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body { font-family: var(--main-font); margin: 0; background: url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; position: relative; background-color: #000; }
        /* Arkaplan görünürlüğü artırmak için biraz daha karartıldı */
        body::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; pointer-events: none; }

        /* Animasyonlar */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        .fade-out { animation: fadeOut 0.5s ease forwards; }

        #waiting-display { position: fixed; top: 60px; left: 80px; width: calc(50% - 80px); text-align: left; z-index: 5; pointer-events: none; }
        /* Satırların yerinin sabit kalması için min-height ve sabit yapı */
        .display-line { height: 1.8rem; font-size: 1.2rem; font-weight: 700; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); margin-bottom: 6px; letter-spacing: -0.2px; line-height: 1.2; width: 100%; }
        
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; }
        h2#status { font-size: 2rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 30px; display: none; }
        
        .admin-trigger { position: fixed; top: 20px; right: 20px; font-size: 1.8rem; opacity: 0.1; cursor: pointer; z-index: 9999; color: white; transition: opacity 0.3s; padding: 10px; }
        .admin-trigger:hover { opacity: 0.8; }
        
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; padding: 25px; box-sizing: border-box; overflow-y: auto; color: white; }
        .admin-layer { display: none; opacity: 0; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 120px; }
        .active-layer { display: block; opacity: 1; animation: fadeIn 0.3s ease; }
        
        .menu-grid { display: grid; gap: 12px; margin-top: 20px; }
        .menu-btn { padding: 16px; font-size: 0.9rem; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        
        .item-card { background: #1e293b; border-radius: 12px; margin-bottom: 8px; border: 1px solid #334155; overflow: hidden; }
        .item-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .confirm-area { display: none; background: rgba(239, 68, 68, 0.2); padding: 12px; border-top: 1px solid var(--danger); text-align: center; animation: fadeIn 0.2s ease; }
        
        .check-list-container { background: #1e293b; border-radius: 12px; padding: 15px; max-height: 400px; overflow-y: auto; border: 1px solid #334155; }
        .poll-btn { background: rgba(79, 70, 229, 0.2); border: 2px solid var(--primary); color: white; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 320px; margin-bottom: 12px; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
        
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(79, 70, 229, 0.4); z-index: -1; transition: width 0.5s ease; }

        .input-group { display: flex; align-items: center; background: var(--input-bg); margin-bottom: 8px; border-radius: 10px; border: 1px solid #334155; padding-right: 10px; }
        .input-group label { padding: 10px; font-size: 0.7rem; color: #94a3b8; min-width: 30px; text-align: center; }
        .input-group input { background: none; border: none; color: white; padding: 12px; outline: none; flex: 1; }
        
        .align-btn { color: #64748b; cursor: pointer; margin: 0 5px; }
        .align-btn.active { color: var(--info); }
        .sticky-bottom-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 50px); max-width: 550px; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="waiting-display"></div>

    <div class="container">
        <h2 id="status" class="fade-in">Bir sonraki oylama gelene kadar müziğin keyfini çıkar</h2>
        <div id="options" class="fade-in"></div>
        <i class="fas fa-cog admin-trigger" onclick="openAdmin(); event.stopPropagation();"></i>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:15px;">
            <div style="font-weight:800; color:#818cf8;">YÖNETİCİ <span id="admin-header-subtitle"></span></div>
            <i class="fas fa-times-circle" style="font-size: 2rem; cursor:pointer; color: #64748b;" onclick="closeAdmin()"></i>
        </div>

        <div id="layer-menu" class="admin-layer active-layer">
            <div id="scene-active-status" style="background:rgba(16, 185, 129, 0.1); padding:10px; border-radius:8px; border:1px solid var(--success); text-align:center; display:none; margin-bottom:15px; color:var(--success); font-weight:800;">SAHNE AKTİF</div>
            <div class="menu-grid">
                <button id="btn-start-scene" class="menu-btn" style="background:var(--success);" onclick="renderStartMekanSelect()">SAHNE BAŞLAT</button>
                <button id="btn-create-poll" class="menu-btn" style="background:var(--primary); display:none;" onclick="openPollCategories()">ANKET OLUŞTUR</button>
                <button id="btn-results" class="menu-btn" style="background:var(--info); display:none;" onclick="renderResults()">SONUÇLAR</button>
                <button id="btn-rep-edit" class="menu-btn" style="background:var(--warning);" onclick="switchLayer('layer-repertoire', ' / REPERTUAR')">REPERTUAR DÜZENLE</button>
                <button class="menu-btn" style="background:var(--info);" onclick="openWaitingLayer()">BEKLEME EKRANI DÜZENLE</button>
            </div>
            <div id="btn-stop-scene-container" class="sticky-bottom-btn" style="display:none;">
                <button class="menu-btn" style="background:var(--danger);" onclick="stopScene()">SAHNEYİ BİTİR</button>
            </div>
        </div>

        <div id="layer-repertoire" class="admin-layer">
            <div class="menu-grid">
                <button class="menu-btn" style="background:var(--success);" onclick="renderMekanList()">MEKAN ŞABLONLARI</button>
                <button class="menu-btn" style="background:var(--warning);" onclick="renderCategories()">KATEGORİLER</button>
                <button class="menu-btn" style="background:var(--info);" onclick="renderSongs()">ŞARKILAR</button>
                <button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-menu', '')">GERİ</button>
            </div>
        </div>

        <div id="layer-songs" class="admin-layer">
            <button class="menu-btn" style="background:var(--success); margin-bottom:15px;" onclick="toggleForm('add-song-form')">+ YENİ ŞARKI</button>
            <div id="add-song-form" style="display:none; padding:15px; background:#1e293b; border-radius:12px; margin-bottom:15px;">
                <input type="text" id="new-song-name" placeholder="Şarkı Adı" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0f172a; color:white;">
                <select id="new-song-cat" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:#0f172a; color:white; border:none;"></select>
                <button class="menu-btn" style="background:var(--success); width:100%;" onclick="saveNewSong()">KAYDET</button>
            </div>
            <div id="songs-list-container"></div>
            <button class="menu-btn" style="background:#334155; margin-top:15px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button>
        </div>

        <div id="layer-categories" class="admin-layer"><div id="category-list"></div><button class="menu-btn" style="background:var(--success); margin-top:15px;" onclick="toggleForm('add-cat-form')">+ YENİ KATEGORİ</button>
            <div id="add-cat-form" style="display:none; padding:15px; background:#1e293b; border-radius:12px; margin-top:10px;"><input type="text" id="new-cat-name" placeholder="Kategori Adı" style="width:100%; padding:12px; margin-bottom:10px; background:#0f172a; color:white; border:none; border-radius:8px;"><button class="menu-btn" style="background:var(--success); width:100%;" onclick="saveNewCategory()">KAYDET</button></div>
            <button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button>
        </div>
        <div id="layer-mekan-list" class="admin-layer"><button class="menu-btn" style="background:var(--success); margin-bottom:15px;" onclick="openMekanForm()">+ YENİ MEKAN EKLE</button><div id="mekan-items"></div><button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button></div>
        <div id="layer-mekan-form" class="admin-layer"><input type="text" id="mekan-name" placeholder="Mekan Adı" style="width:100%; padding:15px; border-radius:12px; background:#1e293b; color:white; border:1px solid var(--info); margin-bottom:15px; box-sizing:border-box;"><div id="mekan-exclude-list" class="check-list-container"></div><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;"><button class="menu-btn" style="background:var(--success);" onclick="saveMekan()">KAYDET</button><button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-mekan-list', '')">İPTAL</button></div></div>
        <div id="layer-waiting" class="admin-layer"><div id="waiting-inputs"></div><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;"><button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-menu', '')">İPTAL</button><button class="menu-btn" style="background:var(--success);" onclick="saveWaiting()">KAYDET</button></div></div>
        <div id="layer-start-mekan-select" class="admin-layer"><div id="start-mekan-items"></div><button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
        <div id="layer-poll-cats" class="admin-layer"><div id="poll-cat-list" class="menu-grid"></div><button class="menu-btn" style="background:#334155; margin-top:20px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
        <div id="layer-poll-create" class="admin-layer"><h3 id="poll-cat-title" style="text-align:center; color:var(--success);"></h3><div id="poll-options-container" class="check-list-container"></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;"><button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-poll-cats', '')">GERI</button><button class="menu-btn" style="background:var(--primary);" onclick="publishPoll()">ANKETİ YAYINLA</button></div></div>
        <div id="layer-results" class="admin-layer"><div id="active-poll-results"></div><button id="btn-end-poll" class="menu-btn" style="background:var(--danger); margin-top:20px; display:none;" onclick="endPoll()">ANKETİ BİTİR</button><button class="menu-btn" style="background:#334155; margin-top:20px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
    </div>

    <script>
        const socket = io();
        let categories = JSON.parse(localStorage.getItem('rep_cats') || '[]');
        let allSongs = JSON.parse(localStorage.getItem('rep_songs') || '[]');
        let mekanlar = JSON.parse(localStorage.getItem('mekan_sablonlari') || '[]');
        let sceneState = { active: false, currentExCats: [], currentExSongs: [], playedSongIds: [], activePoll: null, hasVoted: false };
        let editingMekanIndex = null;

        // --- VERİ YÖNETİMİ ---
        function saveData() {
            localStorage.setItem('rep_cats', JSON.stringify(categories));
            localStorage.setItem('rep_songs', JSON.stringify(allSongs));
            localStorage.setItem('mekan_sablonlari', JSON.stringify(mekanlar));
        }

        // --- UI KONTROLLERİ ---
        function switchLayer(id, sub) {
            document.getElementById('admin-header-subtitle').innerText = sub;
            document.querySelectorAll('.admin-layer').forEach(l => { l.classList.remove('active-layer'); l.style.display = 'none'; });
            const target = document.getElementById(id);
            if(target) { target.style.display = 'block'; setTimeout(() => target.classList.add('active-layer'), 10); }
        }

        function handleGlobalClick(e) {
            if (!e.target.closest('.item-card, .admin-trigger, .menu-btn, .confirm-area, input, select')) {
                document.querySelectorAll('.confirm-area').forEach(a => a.style.display = 'none');
            }
        }

        function showConfirm(id, e) {
            if(e) e.stopPropagation();
            document.querySelectorAll('.confirm-area').forEach(a => a.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'block';
        }

        // --- ŞARKILAR (Düzeltildi: Çöp kutusu ve onay alanı) ---
        function renderSongs() {
            switchLayer('layer-songs', ' / ŞARKILAR');
            const cont = document.getElementById('songs-list-container');
            cont.innerHTML = allSongs.sort((a,b)=>a.name.localeCompare(b.name)).map(s => `
                <div class="item-card">
                    <div class="item-header" onclick="showConfirm('song-confirm-${s.id}', event)">
                        <span>${s.name}</span>
                        <i class="fas fa-trash-alt" style="color:var(--danger)"></i>
                    </div>
                    <div id="song-confirm-${s.id}" class="confirm-area">
                        <button class="menu-btn" style="background:var(--danger); padding:8px;" onclick="deleteSong(${s.id})">SİL</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteSong(id) {
            allSongs = allSongs.filter(s => s.id !== id);
            saveData(); renderSongs();
        }

        function saveNewSong() {
            const n = document.getElementById('new-song-name').value.trim();
            const c = document.getElementById('new-song-cat').value;
            if(n) { 
                allSongs.push({id: Date.now(), name: n, catId: c==='null'?null:parseInt(c)}); 
                saveData(); renderSongs(); 
                document.getElementById('new-song-name').value=''; 
                document.getElementById('add-song-form').style.display='none'; 
            }
        }

        // --- BEKLEME EKRANI (Düzeltildi: Satır kayması ve karartma) ---
        function openWaitingLayer() {
            switchLayer('layer-waiting', ' / BEKLEME EKRANI');
            const cont = document.getElementById('waiting-inputs');
            cont.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('waiting_texts') || '[]');
            for(let i=1; i<=10; i++) {
                const data = saved[i-1] || {text: '', align: 'left'};
                cont.innerHTML += `
                    <div class="input-group">
                        <label>${i}</label>
                        <input type="text" id="w-row-${i}" value="${data.text}" data-align="${data.align}">
                        <div class="align-tools">
                            <i class="fas fa-align-left align-btn ${data.align==='left'?'active':''}" onclick="setWAlign(${i}, 'left')"></i>
                            <i class="fas fa-align-center align-btn ${data.align==='center'?'active':''}" onclick="setWAlign(${i}, 'center')"></i>
                            <i class="fas fa-align-right align-btn ${data.align==='right'?'active':''}" onclick="setWAlign(${i}, 'right')"></i>
                            <i class="fas fa-trash-alt" style="color:var(--danger); margin-left:10px; cursor:pointer;" onclick="clearWRow(${i})"></i>
                        </div>
                    </div>`;
            }
        }

        function clearWRow(i) {
            const inp = document.getElementById(`w-row-${i}`);
            inp.value = '';
            setWAlign(i, 'left');
        }

        function setWAlign(row, align) {
            const inp = document.getElementById(`w-row-${row}`);
            inp.dataset.align = align;
            const parent = inp.parentElement;
            parent.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
            parent.querySelector(`.fa-align-${align}`).classList.add('active');
        }

        function saveWaiting() {
            const data = [];
            for(let i=1; i<=10; i++) {
                const inp = document.getElementById(`w-row-${i}`);
                data.push({text: inp.value, align: inp.dataset.align});
            }
            localStorage.setItem('waiting_texts', JSON.stringify(data));
            renderWaitingDisplay();
            switchLayer('layer-menu', '');
        }

        function renderWaitingDisplay() {
            const cont = document.getElementById('waiting-display');
            cont.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('waiting_texts') || '[]');
            // Kayma olmaması için tüm satırlar (boş olsa bile) render edilir
            for(let i=0; i<10; i++) {
                const item = saved[i] || {text: '', align: 'left'};
                cont.innerHTML += `<div class="display-line" style="text-align:${item.align}">${item.text}</div>`;
            }
        }

        // --- SAHNE YÖNETİMİ ---
        function startSceneAction(index) {
            const m = mekanlar[index];
            sceneState.active = true;
            sceneState.currentExCats = m.exCats;
            sceneState.currentExSongs = m.exSongs;
            sceneState.playedSongIds = [];
            document.getElementById('status').style.display = 'block';
            updateMenuUI();
            switchLayer('layer-menu', '');
        }

        function stopScene() {
            if(confirm("Sahneyi bitir?")) {
                sceneState.active = false;
                document.getElementById('status').style.display = 'none';
                updateMenuUI();
                switchLayer('layer-menu', '');
            }
        }

        function updateMenuUI() {
            const active = sceneState.active;
            document.getElementById('scene-active-status').style.display = active ? 'block' : 'none';
            document.getElementById('btn-start-scene').style.display = active ? 'none' : 'flex';
            document.getElementById('btn-stop-scene-container').style.display = active ? 'block' : 'none';
            document.getElementById('btn-create-poll').style.display = active ? 'flex' : 'none';
            document.getElementById('btn-results').style.display = active ? 'flex' : 'none';
            document.getElementById('btn-rep-edit').style.display = active ? 'none' : 'flex';
        }

        // --- ANKET & SONUÇLAR (Düzeltildi: Canlı sonuçlar ve animasyonlu bitiş) ---
        socket.on('yeni_anket_geldi', (poll) => {
            sceneState.activePoll = poll;
            sceneState.hasVoted = false;
            renderPollUserUI();
        });

        socket.on('oy_sayisini_guncelle', (votes) => {
            if(sceneState.activePoll) {
                sceneState.activePoll.votes = votes;
                if(sceneState.hasVoted) renderLiveResults(); // Kullanıcı oy verdiyse canlı sonucu görsün
                if(document.getElementById('layer-results').style.display === 'block') renderResults(); // Admin ekranını güncelle
            }
        });

        socket.on('anket_temizle', (winner) => {
            const optDiv = document.getElementById('options');
            optDiv.classList.add('fade-out'); // Animasyonla çıkış
            
            setTimeout(() => {
                sceneState.activePoll = null;
                optDiv.innerHTML = '';
                optDiv.classList.remove('fade-out');
                const status = document.getElementById('status');
                status.innerHTML = `<span style="color:var(--success); font-size:1.5rem;">Kazanan:</span><br><span style="font-size:2.5rem;">${winner}</span>`;
                
                // 10 saniye sonra eski yazıya dön (animasyonla)
                setTimeout(() => {
                    status.classList.add('fade-out');
                    setTimeout(() => {
                        if(sceneState.active) {
                            status.innerText = "Bir sonraki oylama gelene kadar müziğin keyfini çıkar";
                            status.classList.remove('fade-out');
                            status.classList.add('fade-in');
                        }
                    }, 500);
                }, 10000);
            }, 500);
        });

        function renderPollUserUI() {
            const cont = document.getElementById('options');
            cont.innerHTML = '';
            document.getElementById('status').innerText = "SIRADAKİ ŞARKIYI SEÇİN";
            sceneState.activePoll.options.forEach(o => {
                const b = document.createElement('button');
                b.className = 'poll-btn fade-in';
                b.innerHTML = `<span>${o.name}</span>`;
                b.onclick = () => {
                    if(!sceneState.hasVoted) {
                        sceneState.hasVoted = true;
                        socket.emit('oy_ver', o.id);
                        renderLiveResults();
                    }
                };
                cont.appendChild(b);
            });
        }

        function renderLiveResults() {
            const cont = document.getElementById('options');
            cont.innerHTML = '<h3 class="fade-in" style="color:var(--info); margin-bottom:15px;">CANLI SONUÇLAR</h3>';
            const poll = sceneState.activePoll;
            let total = Object.values(poll.votes).reduce((a,b)=>a+b, 0);
            
            poll.options.forEach(o => {
                const v = poll.votes[o.id] || 0;
                const p = total > 0 ? (v/total)*100 : 0;
                const div = document.createElement('div');
                div.className = 'poll-btn fade-in';
                div.style.cursor = 'default';
                div.innerHTML = `
                    <div class="progress-bar" style="width:${p}%"></div>
                    <span style="z-index:1">${o.name} (%${Math.round(p)})</span>
                `;
                cont.appendChild(div);
            });
        }

        function renderResults() {
            switchLayer('layer-results', ' / SONUÇLAR');
            const cont = document.getElementById('active-poll-results');
            if(!sceneState.activePoll) { cont.innerHTML = 'Aktif anket yok.'; return; }
            document.getElementById('btn-end-poll').style.display = 'block';
            let total = Object.values(sceneState.activePoll.votes).reduce((a,b)=>a+b, 0);
            cont.innerHTML = sceneState.activePoll.options.map(o => {
                let v = sceneState.activePoll.votes[o.id] || 0;
                let p = total > 0 ? Math.round((v/total)*100) : 0;
                return `<div style="margin-bottom:15px; background:#1e293b; padding:10px; border-radius:8px;">
                            <div style="margin-bottom:5px;">${o.name}</div>
                            <div style="height:10px; background:#0f172a; border-radius:5px; overflow:hidden;">
                                <div style="width:${p}%; height:100%; background:var(--info);"></div>
                            </div>
                            <div style="font-size:0.8rem; margin-top:5px; color:#94a3b8;">%${p} (${v} oy)</div>
                        </div>`;
            }).join('');
        }

        // --- DİĞER FONKSİYONLAR (Admin) ---
        function renderCategories() {
            switchLayer('layer-categories', ' / KATEGORİLER');
            document.getElementById('category-list').innerHTML = categories.map(c => `
                <div class="item-card">
                    <div class="item-header" onclick="showConfirm('cat-conf-${c.id}', event)"><span>${c.name.toUpperCase()}</span><i class="fas fa-trash-alt" style="color:var(--danger)"></i></div>
                    <div id="cat-conf-${c.id}" class="confirm-area"><button class="menu-btn" style="background:var(--danger); padding:8px;" onclick="categories=categories.filter(x=>x.id!==${c.id});saveData();renderCategories();">SİL</button></div>
                </div>
            `).join('');
        }
        function saveNewCategory() {
            const n = document.getElementById('new-cat-name').value.trim();
            if(n) { categories.push({id: Date.now(), name: n}); saveData(); renderCategories(); document.getElementById('new-cat-name').value=''; document.getElementById('add-cat-form').style.display='none'; }
        }
        function renderMekanList() {
            switchLayer('layer-mekan-list', ' / MEKANLAR');
            document.getElementById('mekan-items').innerHTML = mekanlar.map((m, i) => `
                <div class="item-card">
                    <div class="item-header"><span>${m.name}</span><div style="display:flex; gap:15px;"><i class="fas fa-edit" style="color:var(--info)" onclick="openMekanForm(${i})"></i><i class="fas fa-trash-alt" style="color:var(--danger)" onclick="showConfirm('mekan-conf-${i}', event)"></i></div></div>
                    <div id="mekan-conf-${i}" class="confirm-area"><button class="menu-btn" style="background:var(--danger); padding:8px;" onclick="mekanlar.splice(${i},1);saveData();renderMekanList();">SİL</button></div>
                </div>
            `).join('');
        }
        function openMekanForm(index = null) {
            editingMekanIndex = index; switchLayer('layer-mekan-form', ' / MEKAN FORMU');
            document.getElementById('mekan-name').value = index !== null ? mekanlar[index].name : '';
            const list = document.getElementById('mekan-exclude-list'); let html = '';
            categories.forEach(c => {
                const isCatChecked = index !== null ? !mekanlar[index].exCats.includes(c.id) : true;
                html += `<div style="border-bottom:1px solid #444; margin-bottom:10px; padding-bottom:5px;">
                    <label class="check-item"><input type="checkbox" class="cat-check" data-id="${c.id}" ${isCatChecked ? 'checked' : ''} onchange="document.querySelectorAll('.song-check[data-cat=\\'${c.id}\\']').forEach(x=>x.checked=this.checked)"> <b style="color:var(--warning)">${c.name.toUpperCase()}</b></label>
                    <div style="padding-left:25px;">${allSongs.filter(s => s.catId === c.id).map(s => {
                        const isSongChecked = index !== null ? !mekanlar[index].exSongs.includes(s.id) : true;
                        return `<label class="check-item"><input type="checkbox" class="song-check" data-id="${s.id}" data-cat="${c.id}" ${isSongChecked ? 'checked' : ''}> ${s.name}</label>`;
                    }).join('')}</div></div>`;
            });
            list.innerHTML = html;
        }
        function saveMekan() {
            const name = document.getElementById('mekan-name').value.trim(); if(!name) return;
            const exCats = Array.from(document.querySelectorAll('.cat-check:not(:checked)')).map(x => parseInt(x.dataset.id));
            const exSongs = Array.from(document.querySelectorAll('.song-check:not(:checked)')).map(x => parseInt(x.dataset.id));
            if(editingMekanIndex !== null) mekanlar[editingMekanIndex] = {name, exCats, exSongs}; else mekanlar.push({name, exCats, exSongs});
            saveData(); renderMekanList();
        }
        function renderStartMekanSelect() {
            switchLayer('layer-start-mekan-select', ' / MEKAN SEÇ');
            document.getElementById('start-mekan-items').innerHTML = mekanlar.map((m, i) => `<button class="menu-btn" style="background:#1e293b; border:1px solid var(--success); margin-bottom:10px;" onclick="startSceneAction(${i})">${m.name}</button>`).join('');
        }
        function openPollCategories() {
            switchLayer('layer-poll-cats', ' / ANKET');
            document.getElementById('poll-cat-list').innerHTML = categories.filter(c => !sceneState.currentExCats.includes(c.id)).map(c => `<button class="menu-btn" style="background:var(--warning)" onclick="renderPollOptions(${c.id}, '${c.name}')">${c.name}</button>`).join('');
        }
        function renderPollOptions(catId, catName) {
            document.getElementById('poll-cat-title').innerText = catName.toUpperCase(); switchLayer('layer-poll-create', ' / SEÇENEKLER');
            document.getElementById('poll-options-container').innerHTML = allSongs.filter(s => s.catId === catId && !sceneState.currentExSongs.includes(s.id) && !sceneState.playedSongIds.includes(s.id)).map(s => `<label class="check-item"><input type="checkbox" class="poll-choice" value="${s.id}" data-name="${s.name}"> ${s.name}</label>`).join('');
        }
        function publishPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-choice:checked')); if(sel.length < 2) return alert("En az 2 şarkı!");
            const pollData = { options: sel.map(x => ({id: parseInt(x.value), name: x.dataset.name})), votes: {} };
            pollData.options.forEach(o => pollData.votes[o.id] = 0);
            socket.emit('anket_yayinla', pollData); closeAdmin();
        }
        function endPoll() {
            const p = sceneState.activePoll; const winner = p.options.reduce((a,b) => (p.votes[a.id]||0) >= (p.votes[b.id]||0) ? a : b);
            sceneState.playedSongIds.push(winner.id); socket.emit('anketi_bitir_sinyali', winner.name); closeAdmin();
        }
        function toggleForm(id) { const f = document.getElementById(id); f.style.display = f.style.display === 'block' ? 'none' : 'block'; if(id === 'add-song-form') fillCatSelect(); }
        function fillCatSelect() { document.getElementById('new-song-cat').innerHTML = '<option value="null">Kategorisiz</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join(''); }
        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; switchLayer('layer-menu', ''); updateMenuUI(); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        window.onload = () => { renderWaitingDisplay(); if(sceneState.activePoll) renderPollUserUI(); };
    </script>
</body>
</html>
