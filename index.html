<script>
    const socket = io();
    let categories = JSON.parse(localStorage.getItem('rep_cats') || '[]');
    let allSongs = JSON.parse(localStorage.getItem('rep_songs') || '[]');
    let sceneActive = false;
    let currentPoll = null;

    // --- SOCKET EVENTLERI ---

    // Sahne durumunu tüm cihazlarda senkronize eder
    socket.on('sahne_durumu_guncelle', (isActive) => {
        sceneActive = isActive;
        const statusEl = document.getElementById('status');
        if (isActive) {
            statusEl.innerText = "Bir sonraki oylama gelene kadar müziğin keyfini çıkar";
            statusEl.style.display = 'block';
        } else {
            statusEl.style.display = 'none';
        }
        updateAdminUI();
    });

    socket.on('bekleme_guncelle', (data) => {
        localStorage.setItem('waiting_texts', JSON.stringify(data));
        renderWaitingDisplay(); // Tüm cihazlarda metinler anında güncellenir
    });

    socket.on('anket_temizle', (winner) => {
        currentPoll = null;
        const statusEl = document.getElementById('status');
        document.getElementById('options').innerHTML = '';
        if(winner) {
            statusEl.innerHTML = `<span style="color:var(--success)">KAZANAN</span><br><div style="font-size:3rem">${winner}</div>`;
            setTimeout(() => { if(sceneActive) statusEl.innerText = "Bir sonraki oylama gelene kadar müziğin keyfini çıkar"; }, 10000);
        } else {
            statusEl.innerText = "Bir sonraki oylama gelene kadar müziğin keyfini çıkar";
        }
    });

    // --- ANA FONKSİYONLAR ---

    function startScene() {
        socket.emit('sahne_durumu_degistir', true); // Tüm cihazlara "sahne başladı" der
        closeAdmin();
    }

    function stopScene() {
        if(confirm("Sahne bitirilsin mi?")) {
            socket.emit('sahne_durumu_degistir', false);
            socket.emit('anketi_bitir_sinyali', null);
        }
    }

    // Kategori Silme: Onay mekanizmalı ve şarkıları koruyan sistem
    function deleteCat(catId) {
        // 1. Kategoriyi sil
        categories = categories.filter(c => c.id !== catId);
        
        // 2. Bu kategoriye ait şarkıları "kategorisiz" (null) yap
        allSongs = allSongs.map(s => {
            if (s.catId === catId) return { ...s, catId: null };
            return s;
        });

        saveData();
        renderCategories(); // Listeyi tazele
        alert("Kategori silindi, şarkılar 'Kategorisiz' olarak korundu.");
    }

    function saveWaiting() {
        const data = [];
        for(let i=1; i<=10; i++) {
            const inp = document.getElementById(`w-in-${i}`);
            data.push({text: inp.value, align: inp.dataset.align});
        }
        socket.emit('bekleme_yayinla', data); // Bu satır sayesinde her cihazda adminin ayarı görünür
        switchLayer('layer-menu', '');
    }

    // --- UI GÜNCELLEMELERİ ---
    function renderCategories() {
        switchLayer('layer-cats', '/ KATEGORİLER');
        const cont = document.getElementById('cat-list');
        cont.innerHTML = categories.map(c => `
            <div class="cat-item">
                <div class="item-header" onclick="toggleActions('cat-${c.id}')">
                    <span>${c.name.toUpperCase()}</span><i class="fas fa-chevron-down"></i>
                </div>
                <div id="cat-${c.id}" class="confirm-area">
                    <button class="menu-btn" style="background:var(--success); margin-bottom:5px;" onclick="openAddSongToCat(${c.id})">ŞARKI EKLE</button>
                    <button class="menu-btn" style="background:var(--danger)" onclick="toggleActions('conf-del-${c.id}')">KATEGORİYİ SİL</button>
                    <div id="conf-del-${c.id}" style="display:none; padding:10px; background:rgba(239, 68, 68, 0.1); border-radius:8px; margin-top:5px;">
                        <p style="font-size:0.8rem; margin-bottom:5px;">Emin misiniz? Şarkılar silinmez.</p>
                        <button class="menu-btn" style="background:var(--danger); font-size:0.7rem;" onclick="deleteCat(${c.id})">EVET, SİL</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateAdminUI() {
        const sStatus = document.getElementById('scene-status');
        if(sStatus) sStatus.style.display = sceneActive ? 'block' : 'none';
        document.getElementById('btn-start').style.display = sceneActive ? 'none' : 'flex';
        document.getElementById('btn-poll').style.display = sceneActive ? 'flex' : 'none';
        document.getElementById('btn-stop').style.display = sceneActive ? 'flex' : 'none';
        document.getElementById('btn-rep').style.display = sceneActive ? 'none' : 'flex';
    }

    function toggleActions(id) {
        const el = document.getElementById(id);
        const isVisible = el.style.display === 'block';
        // Diğer açık onay kutularını kapatmak istersen burayı düzenleyebilirsin
        el.style.display = isVisible ? 'none' : 'block';
    }

    function saveData() {
        localStorage.setItem('rep_cats', JSON.stringify(categories));
        localStorage.setItem('rep_songs', JSON.stringify(allSongs));
    }
</script>
