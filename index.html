<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Anket - Yönetim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --info: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --dark: #0f172a;
            --input-bg: #1e293b; --main-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body { font-family: var(--main-font); margin: 0; background: url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; position: relative; background-color: #000; }
        body::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; pointer-events: none; }
        #waiting-display { position: fixed; top: 60px; left: 80px; width: calc(50% - 80px); text-align: left; z-index: 5; pointer-events: none; }
        .display-line { min-height: 1.5rem; font-size: 1.2rem; font-weight: 700; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); margin-bottom: 6px; letter-spacing: -0.2px; line-height: 1.2; width: 100%; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; text-align: center; }
        h2#status { font-size: 2rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .admin-trigger { position: fixed; top: 20px; right: 20px; font-size: 1.8rem; opacity: 0.1; cursor: pointer; z-index: 9999; color: white; transition: opacity 0.3s; padding: 10px; }
        .admin-trigger:hover { opacity: 0.8; }
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; padding: 25px; box-sizing: border-box; overflow-y: auto; color: white; }
        .admin-layer { display: none; opacity: 0; transform: translateY(20px); transition: all 0.3s ease-out; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 120px; }
        .active-layer { display: block; opacity: 1; transform: translateY(0); }
        .menu-grid { display: grid; gap: 12px; margin-top: 20px; }
        .menu-btn { padding: 16px; font-size: 0.9rem; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .sticky-bottom-btn { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 50px); max-width: 550px; z-index: 10001; }
        .cat-item, .mekan-card { background: #1e293b; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; overflow: hidden; }
        .cat-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(245, 158, 11, 0.1); }
        .cat-content { display: none; padding: 15px; background: #0f172a; border-top: 1px solid #334155; }
        .result-bar-container { background: #1e293b; border-radius: 10px; margin-bottom: 10px; overflow: hidden; position: relative; height: 40px; border: 1px solid #334155; }
        .result-bar-fill { background: var(--primary); height: 100%; transition: width 0.5s ease; width: 0%; }
        .result-bar-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; font-weight: 700; font-size: 0.9rem; }
        .poll-btn { background: rgba(79, 70, 229, 0.2); border: 2px solid var(--primary); color: white; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: 700; cursor: pointer; width: 300px; margin-bottom: 15px; }
        .input-group { display: flex; align-items: center; background: var(--input-bg); margin-bottom: 8px; border-radius: 10px; border: 1px solid #334155; }
        .input-group input { background: none; border: none; color: white; padding: 12px; outline: none; font-size: 0.95rem; flex: 2; width: 100%; }
        .check-list-container { background: #1e293b; border-radius: 12px; padding: 15px; max-height: 350px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #334155; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; cursor: pointer; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cat-mini-btn { padding: 8px 12px; font-size: 0.75rem; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; color: white; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="waiting-display"></div>

    <div class="container">
        <h2 id="status">Bir sonraki oylama gelene kadar müziğin keyfini çıkar</h2>
        <div id="options"></div>
        <i class="fas fa-cog admin-trigger" onclick="openAdmin(); event.stopPropagation();"></i>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 1px solid #334155; padding-bottom:15px;">
            <div id="admin-header-title" style="font-weight:800; color:#818cf8;">YÖNETİCİ <span id="admin-header-subtitle"></span></div>
            <i class="fas fa-times-circle" style="font-size: 2rem; cursor:pointer; color: #64748b;" onclick="closeAdmin()"></i>
        </div>

        <div id="layer-menu" class="admin-layer active-layer">
            <div id="scene-active-status" style="background:rgba(16, 185, 129, 0.1); padding:10px; border-radius:8px; border:1px solid var(--success); text-align:center; display:none; margin-bottom:15px; color:var(--success); font-weight:800;">SAHNE AKTİF</div>
            <div class="menu-grid">
                <button id="btn-start-scene" class="menu-btn" style="background:var(--success);" onclick="renderStartMekanSelect()">SAHNE BAŞLAT</button>
                <button id="btn-create-poll" class="menu-btn" style="background:var(--primary); display:none;" onclick="openPollCategories()">ANKET OLUŞTUR</button>
                <button id="btn-results" class="menu-btn" style="background:var(--info); display:none;" onclick="renderResults()">SONUÇLAR</button>
                <button id="btn-rep-edit" class="menu-btn" style="background:var(--warning);" onclick="switchLayer('layer-repertoire', ' / REPERTUAR')">REPERTUAR DÜZENLE</button>
                <button class="menu-btn" style="background:var(--info);" onclick="openWaitingLayer()">BEKLEME EKRANI DÜZENLE</button>
            </div>
            <div id="btn-stop-scene-container" class="sticky-bottom-btn" style="display:none;">
                <button class="menu-btn" style="background:var(--danger);" onclick="stopScene()">SAHNEYİ BİTİR</button>
            </div>
        </div>

        <div id="layer-repertoire" class="admin-layer">
            <div class="menu-grid">
                <button class="menu-btn" style="background:var(--success);" onclick="renderMekanList()">MEKAN ŞABLONLARI</button>
                <button class="menu-btn" style="background:var(--warning);" onclick="renderCategories()">KATEGORİLER</button>
                <button class="menu-btn" style="background:var(--info);" onclick="renderSongs()">ŞARKILAR</button>
                <button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-menu', '')">GERİ</button>
            </div>
        </div>

        <div id="layer-categories" class="admin-layer">
            <div id="category-list"></div>
            <button class="menu-btn" style="background:var(--success); margin-top:15px;" onclick="toggleAccordionForm('add-cat-form', event)">+ YENİ KATEGORİ OLUŞTUR</button>
            <div id="add-cat-form" style="display:none; background:#1e293b; padding:15px; border-radius:12px; margin-top:10px; border:1px solid var(--success);" onclick="event.stopPropagation()">
                <input type="text" id="new-cat-name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0f172a; color:white; box-sizing:border-box;" placeholder="Kategori Adı">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="menu-btn" style="background:var(--success);" onclick="saveNewCategory()">KAYDET</button>
                    <button class="menu-btn" style="background:var(--danger);" onclick="closeAllForms()">İPTAL</button>
                </div>
            </div>
            <button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button>
        </div>

        <div id="layer-songs" class="admin-layer">
            <button class="menu-btn" style="background:var(--success); margin-bottom:15px;" onclick="toggleAccordionForm('add-song-form', event)">+ YENİ ŞARKI EKLE</button>
            <div id="add-song-form" style="display:none; background:#1e293b; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--success);" onclick="event.stopPropagation()">
                <input type="text" id="new-song-name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#0f172a; color:white; box-sizing:border-box;" placeholder="Şarkı Adı">
                <select id="new-song-cat" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:none; background:#0f172a; color:white;"></select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="menu-btn" style="background:var(--success);" onclick="saveNewSong()">KAYDET</button>
                    <button class="menu-btn" style="background:var(--danger);" onclick="closeAllForms()">İPTAL</button>
                </div>
            </div>
            <div id="songs-list-container"></div>
            <button class="menu-btn" style="background:#334155; margin-top:15px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button>
        </div>

        <div id="layer-mekan-list" class="admin-layer">
            <button class="menu-btn" style="background:var(--success); margin-bottom:15px;" onclick="openMekanForm()">+ YENİ MEKAN EKLE</button>
            <div id="mekan-items"></div>
            <button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-repertoire', '')">GERİ</button>
        </div>

        <div id="layer-mekan-form" class="admin-layer">
            <input type="text" id="mekan-name" placeholder="Mekan Adı" style="width:100%; padding:15px; border-radius:12px; background:#1e293b; color:white; border:1px solid var(--info); margin-bottom:15px; box-sizing:border-box;">
            <p style="font-size:0.8rem; color:var(--warning); margin-bottom:10px;">Hangi kategoriler/şarkılar AKTİF olsun? (İşaretli olanlar görünür)</p>
            <div id="mekan-exclude-list" class="check-list-container"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="menu-btn" style="background:var(--success);" onclick="saveMekan()">KAYDET</button>
                <button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-mekan-list', '')">İPTAL</button>
            </div>
        </div>

        <div id="layer-waiting" class="admin-layer">
            <div id="waiting-inputs"></div>
            <div class="menu-grid" style="grid-template-columns: 1fr 1fr;">
                <button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-menu', '')">GERİ</button>
                <button class="menu-btn" style="background:var(--success);" onclick="saveWaiting()">KAYDET</button>
            </div>
        </div>
        <div id="layer-results" class="admin-layer"><div id="active-poll-results"></div><button id="btn-end-poll" class="menu-btn" style="background:var(--danger); margin-top:20px; display:none;" onclick="endPoll()">ANKETİ BİTİR</button><button class="menu-btn" style="background:#334155; margin-top:20px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
        <div id="layer-start-mekan-select" class="admin-layer"><div id="start-mekan-items"></div><button class="menu-btn" style="background:#334155; margin-top:10px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
        <div id="layer-poll-cats" class="admin-layer"><div id="poll-cat-list" class="menu-grid"></div><button class="menu-btn" style="background:#334155; margin-top:20px;" onclick="switchLayer('layer-menu', '')">GERİ</button></div>
        <div id="layer-poll-create" class="admin-layer"><h3 id="poll-cat-title" style="text-align:center; color:var(--success);"></h3><div id="poll-options-container" class="check-list-container"></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><button class="menu-btn" style="background:#334155;" onclick="switchLayer('layer-poll-cats', '')">GERI</button><button class="menu-btn" style="background:var(--primary);" onclick="publishPoll()">ANKETİ YAYINLA</button></div></div>
    </div>

    <script>
        const socket = io();
        let categories = JSON.parse(localStorage.getItem('rep_cats') || '[]');
        let allSongs = JSON.parse(localStorage.getItem('rep_songs') || '[]');
        let mekanlar = JSON.parse(localStorage.getItem('mekan_sablonlari') || '[]');
        let sceneState = { active: false, currentExCats: [], currentExSongs: [], playedSongIds: [], activePoll: null, history: [] };
        let editingMekanIndex = null;

        // VERİ KAYDETME VE YÜKLEME
        function saveData() { 
            localStorage.setItem('rep_cats', JSON.stringify(categories));
            localStorage.setItem('rep_songs', JSON.stringify(allSongs));
            localStorage.setItem('mekan_sablonlari', JSON.stringify(mekanlar));
        }

        // --- KATEGORİ KAYDETME (DÜZELTİLDİ) ---
        function saveNewCategory() {
            const input = document.getElementById('new-cat-name');
            const name = input.value.trim();
            if(name) {
                categories.push({ id: Date.now(), name: name });
                saveData();
                input.value = '';
                renderCategories(); // Listeyi güncelle
                closeAllForms();
            }
        }

        // --- ŞARKI KAYDETME (DÜZELTİLDİ) ---
        function saveNewSong() {
            const nameInput = document.getElementById('new-song-name');
            const catSelect = document.getElementById('new-song-cat');
            const name = nameInput.value.trim();
            const catId = catSelect.value === 'null' ? null : parseInt(catSelect.value);
            
            if(name) {
                allSongs.push({ id: Date.now(), name: name, catId: catId });
                saveData();
                nameInput.value = '';
                renderSongs(); // Listeyi güncelle
                closeAllForms();
            }
        }

        // --- MEKAN KAYDETME (DÜZELTİLDİ) ---
        function saveMekan() {
            const name = document.getElementById('mekan-name').value.trim();
            if(!name) return alert("Mekan adı girin!");
            
            // İşaretli OLMAYANLARI dışlanan listesine atarız
            const exCats = Array.from(document.querySelectorAll('.cat-check:not(:checked)')).map(x => parseInt(x.value));
            const exSongs = Array.from(document.querySelectorAll('.song-check:not(:checked)')).map(x => parseInt(x.value));
            
            const mekanData = { name, exCats, exSongs };
            
            if(editingMekanIndex !== null) {
                mekanlar[editingMekanIndex] = mekanData;
            } else {
                mekanlar.push(mekanData);
            }
            
            saveData();
            editingMekanIndex = null;
            renderMekanList(); // Listeye dön
        }

        // --- UI YÖNETİMİ ---
        function switchLayer(id, sub) {
            document.getElementById('admin-header-subtitle').innerText = sub;
            document.querySelectorAll('.admin-layer').forEach(l => { l.classList.remove('active-layer'); l.style.display = 'none'; });
            const target = document.getElementById(id);
            if(target) { target.style.display = 'block'; setTimeout(() => target.classList.add('active-layer'), 10); }
        }

        function toggleAccordionForm(id, event) {
            if(event) event.stopPropagation();
            const form = document.getElementById(id);
            const isOpen = form.style.display === 'block';
            closeAllForms();
            if(!isOpen) {
                form.style.display = 'block';
                if(id === 'add-song-form') fillCatSelect();
            }
        }

        function closeAllForms() {
            document.querySelectorAll('#add-cat-form, #add-song-form, .cat-content').forEach(f => f.style.display = 'none');
        }

        function handleGlobalClick(e) {
            if (!e.target.closest('.cat-item, .admin-trigger, #add-cat-form, #add-song-form')) closeAllForms();
        }

        // --- RENDER FONKSİYONLARI ---
        function renderCategories() {
            switchLayer('layer-categories', ' / KATEGORİLER');
            const list = document.getElementById('category-list');
            list.innerHTML = categories.map(c => `
                <div class="cat-item">
                    <div class="cat-header" onclick="openCatAccordion(${c.id})">
                        <span>${c.name.toUpperCase()}</span>
                        <i class="fas fa-trash" onclick="deleteCategory(${c.id}); event.stopPropagation();"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderSongs() {
            switchLayer('layer-songs', ' / ŞARKILAR');
            const cont = document.getElementById('songs-list-container');
            cont.innerHTML = allSongs.map(s => `
                <div style="background:#1e293b; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between;">
                    <span>${s.name}</span>
                    <i class="fas fa-trash-alt" style="color:var(--danger)" onclick="allSongs=allSongs.filter(x=>x.id!==${s.id});saveData();renderSongs();"></i>
                </div>
            `).join('');
        }

        function renderMekanList() {
            switchLayer('layer-mekan-list', ' / MEKANLAR');
            const cont = document.getElementById('mekan-items');
            cont.innerHTML = mekanlar.map((m, i) => `
                <div class="mekan-card" style="padding:15px; display:flex; justify-content:space-between;">
                    <span>${m.name}</span>
                    <div>
                        <button class="cat-mini-btn" style="background:var(--info)" onclick="openMekanForm(${i})">DÜZENLE</button>
                        <button class="cat-mini-btn" style="background:var(--danger)" onclick="mekanlar.splice(${i},1);saveData();renderMekanList();">SİL</button>
                    </div>
                </div>
            `).join('');
        }

        function openMekanForm(index = null) {
            editingMekanIndex = index;
            switchLayer('layer-mekan-form', ' / MEKAN FORMU');
            const nameInput = document.getElementById('mekan-name');
            const list = document.getElementById('mekan-exclude-list');
            
            nameInput.value = index !== null ? mekanlar[index].name : '';
            
            let html = '';
            categories.forEach(c => {
                const isChecked = index !== null ? !mekanlar[index].exCats.includes(c.id) : true;
                html += `<label class="check-item"><input type="checkbox" class="cat-check" value="${c.id}" ${isChecked ? 'checked' : ''}> <b>${c.name.toUpperCase()} (Tüm Kategori)</b></label>`;
                allSongs.filter(s => s.catId === c.id).forEach(s => {
                    const sChecked = index !== null ? !mekanlar[index].exSongs.includes(s.id) : true;
                    html += `<label class="check-item" style="padding-left:30px;"><input type="checkbox" class="song-check" value="${s.id}" ${sChecked ? 'checked' : ''}> ${s.name}</label>`;
                });
            });
            list.innerHTML = html;
        }

        function fillCatSelect() {
            const s = document.getElementById('new-song-cat');
            s.innerHTML = '<option value="null">Kategorisiz</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function deleteCategory(id) {
            if(confirm("Kategoriyi silmek istediğine emin misin? Şarkılar boşa çıkar.")) {
                categories = categories.filter(c => c.id !== id);
                allSongs.forEach(s => { if(s.catId === id) s.catId = null; });
                saveData();
                renderCategories();
            }
        }

        // --- SOCKET & ADMIN PANEL DİĞER ---
        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; switchLayer('layer-menu', ''); updateMenuUI(); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function updateMenuUI() {
            const active = sceneState.active;
            document.getElementById('scene-active-status').style.display = active ? 'block' : 'none';
            document.getElementById('btn-start-scene').style.display = active ? 'none' : 'flex';
            document.getElementById('btn-stop-scene-container').style.display = active ? 'block' : 'none';
            document.getElementById('btn-create-poll').style.display = active ? 'flex' : 'none';
            document.getElementById('btn-results').style.display = active ? 'flex' : 'none';
        }

        // Uygulama açılışında bekleme ekranını çiz
        window.onload = () => { if(typeof renderWaitingDisplay === 'function') renderWaitingDisplay(); };
    </script>
</body>
</html>
