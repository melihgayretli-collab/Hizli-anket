<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a; --panel-bg: #111827; --input-bg: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; font-size: 1.2rem; font-weight: bold; }
        .poll-card:active { transform: scale(0.95); background: var(--primary); }
        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.4rem; z-index: 1001; animation: blinker 1s linear infinite; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes blinker { 50% { opacity: 0; } }
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; width: 100%; margin-bottom: 12px; min-height: 65px; }
        .admin-main-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .res-row { margin-bottom: 20px; }
        .res-bar-bg { background: #374151; height: 26px; border-radius: 13px; margin-top: 8px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .res-bar-fill { background: linear-gradient(90deg, var(--primary), #818cf8); height: 100%; transition: width 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; }
        .res-label { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 600; padding: 0 5px; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 12px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid #374151; }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
        .poll-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--success); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>
    <div class="content">
        <div id="waiting-area" style="width:100%"><div id="v1" class="waiting-line"></div><div id="v2" class="waiting-line"></div></div>
        <div id="poll-view"><h2 id="poll-title">Sıradaki Şarkıyı Seç!</h2><div id="poll-options-list"></div></div>
    </div>
    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>
    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">Yönetim</h3>
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left:5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>
            <div id="active-scene-controls" style="display:none; flex-direction:column; width:100%;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background:var(--primary);">Oylama Oluştur <i class="fas fa-poll-h"></i></button>
                <button id="btn-results" class="admin-main-btn" onclick="openPage('p-results')" style="background:var(--primary);">Sonuç / Geçmiş <i class="fas fa-chart-line"></i></button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left:5px solid var(--danger); margin-top:10px;">Sahne Bitir <i class="fas fa-stop"></i></button>
            </div>
            <div id="standard-menu" style="width:100%;">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle</button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle</button>
            </div>
            <button id="btn-close-panel" class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-poll-create" class="admin-page">
            <h3>Oylama Seçenekleri</h3>
            <div style="position:relative; margin-bottom:15px;">
                <i class="fas fa-search" style="position:absolute; left:12px; top:14px; color:#9ca3af;"></i>
                <input type="text" id="song-search" class="admin-input" placeholder="Şarkı ara..." style="padding-left:35px;" oninput="filterSongs(this.value)">
            </div>
            <div id="poll-selection-cont"></div>
            <button class="action-btn" style="background:var(--success); margin-top:20px;" onclick="sendPoll()">ANKETİ BAŞLAT</button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-results" class="admin-page">
            <h3>Canlı Oylama Sonuçları</h3>
            <div id="results-cont"></div>
            <button id="finish-poll-btn" class="action-btn" style="background:var(--danger); margin-top:30px; display:none;" onclick="finishPoll()">OYLAMAYI BİTİR VE KAYDET</button>
            <div id="poll-history" style="margin-top:40px; border-top:1px solid #374151; padding-top:20px;">
                <h4 style="color:#9ca3af;"><i class="fas fa-history"></i> Oylama Geçmişi</h4>
                <div id="history-list"></div>
            </div>
            <button class="action-btn" style="background:var(--input-bg); margin-top:20px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar Yönetimi</h3>
            <button class="admin-main-btn" onclick="openPage('p-cats')">Kategoriler</button>
            <button class="admin-main-btn" onclick="openPage('p-songs')">Şarkılar</button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>
        <div id="p-cats" class="admin-page"><h3>Kategoriler</h3><div id="cat-list-cont"></div><button class="action-btn" onclick="openPage('p-repertuar')">GERİ</button></div>
        <div id="p-songs" class="admin-page"><h3>Şarkılar</h3><div id="song-list-cont"></div><button class="action-btn" onclick="openPage('p-repertuar')">GERİ</button></div>
        <div id="p-waiting" class="admin-page"><h3>Bekleme Ekranı</h3><input type="text" id="i1" class="admin-input" placeholder="Satır 1"><input type="text" id="i2" class="admin-input" placeholder="Satır 2"><button class="action-btn" onclick="pubWait()">YAYINLA</button><button class="action-btn" onclick="openPage('p-main')">GERİ</button></div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, activePoll: null, history: [], usedSongs: [] };

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });
        socket.on('poll_update', pollData => { db.activePoll = pollData; if(document.getElementById('p-results').classList.contains('active')) renderResults(); updateUIState(); });
        socket.on('bekleme_mesaji_guncelle', d => { 
            document.getElementById('v1').innerText = d.line1; document.getElementById('v1').style.textAlign = d.align1; document.getElementById('v1').style.fontSize = d.size1;
            document.getElementById('v2').innerText = d.line2; document.getElementById('v2').style.textAlign = d.align2; document.getElementById('v2').style.fontSize = d.size2;
        });

        function filterSongs(q) {
            const term = q.toLowerCase();
            document.querySelectorAll('#poll-selection-cont .list-item').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        }

        function renderAll() {
            const used = db.usedSongs || [];
            // Oylama Seçimi Render
            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const sng = db.songs.filter(s => s.catId == c.id);
                if(sng.length === 0) return '';
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} <i class="fas fa-chevron-down"></i></button><div class="cat-songs active">${sng.map(s => {
                    const isUsed = used.includes(String(s.id));
                    return `<div class="list-item" style="opacity:${isUsed ? '0.4' : '1'}"><span>${s.name} ${isUsed ? '(Çalındı)' : ''}</span><input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}" ${isUsed ? 'disabled' : ''}></div>`;
                }).join('')}</div></div>`;
            }).join('');

            // Geçmiş Listesi Render
            document.getElementById('history-list').innerHTML = (db.history && db.history.length > 0) ? db.history.map(h => `<div class="list-item" style="border-left:3px solid var(--success)"><span>${h.songName}</span><span style="font-size:0.8rem; color:#9ca3af;">${h.votes} Oy</span></div>`).join('') : '<p>Henüz kayıt yok.</p>';

            // Diğer standart renderlar...
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => `<div class="list-item"><span>${c.name}</span><button onclick="askDelCat(${c.id})">Sil</button></div>`).join('');
            document.getElementById('song-list-cont').innerHTML = db.songs.map(s => `<div class="list-item"><span>${s.name}</span></div>`).join('');
        }

        function renderResults() {
            const cont = document.getElementById('results-cont');
            if(!db.activePoll) { cont.innerHTML = "<p style='text-align:center;'>Şu an aktif bir oylama yok.</p>"; return; }
            const total = db.activePoll.options.reduce((a, b) => a + (Number(b.votes) || 0), 0);
            cont.innerHTML = `<div style="text-align:center; color:var(--success); margin-bottom:15px;">TOPLAM OY: ${total}</div>` +
            db.activePoll.options.map(opt => {
                const perc = total > 0 ? Math.round(((Number(opt.votes) || 0) / total) * 100) : 0;
                return `<div class="res-row"><div class="res-label"><span>${opt.name}</span><span>${opt.votes} Oy (%${perc})</span></div><div class="res-bar-bg"><div class="res-bar-fill" style="width:${perc}%"></div></div></div>`;
            }).join('');
        }

        function finishPoll() {
            if(!db.activePoll) return;
            const winner = [...db.activePoll.options].sort((a,b) => b.votes - a.votes)[0];
            if(winner && winner.votes > 0) {
                if(!db.history) db.history = []; if(!db.usedSongs) db.usedSongs = [];
                db.history.unshift({ songName: winner.name, votes: winner.votes });
                db.usedSongs.push(String(winner.id));
            }
            db.activePoll = null;
            socket.emit('db_update', db);
            renderResults();
        }

        function sendPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({ id: cb.value, name: cb.getAttribute('data-name'), votes: 0 }));
            if(sel.length < 2) return alert("En az 2 şarkı!");
            db.activePoll = { options: sel, id: Date.now() };
            socket.emit('start_poll', db.activePoll); openPage('p-main');
        }

        function updateUIState() {
            const isLive = db.sceneActive; const hasPoll = db.activePoll !== null;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('btn-create-poll').disabled = hasPoll;
            document.getElementById('finish-poll-btn').style.display = hasPoll ? 'block' : 'none';
            if(hasPoll) { showPollToUser(db.activePoll); } else { document.getElementById('poll-view').style.display = 'none'; document.getElementById('waiting-area').style.display = 'block'; }
        }

        function showPollToUser(poll) {
            document.getElementById('waiting-area').style.display = 'none';
            document.getElementById('poll-view').style.display = 'flex';
            if(!document.getElementById('poll-options-list').innerHTML.includes("Oyun Alındı")) {
                document.getElementById('poll-options-list').innerHTML = poll.options.map(opt => `<div class="poll-card" onclick="castVote('${opt.id}')">${opt.name}</div>`).join('');
            }
        }
        function castVote(sId) { socket.emit('submit_vote', sId); document.getElementById('poll-view').innerHTML = "<h2>Oyun Alındı!</h2>"; }
        function askStartScene() { db.sceneActive = true; socket.emit('db_update', db); }
        function askEndScene() { const pw = prompt("Şifre:"); if(pw === "1167") { db.sceneActive = false; db.activePoll = null; socket.emit('db_update', db); location.reload(); } }
        function showAuthDrawer() { const pw = prompt("Şifre:"); if(pw === "1167") document.getElementById('admin-portal').style.display = 'block'; }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); renderAll(); if(id==='p-results') renderResults(); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
    </script>
</body>
</html>
