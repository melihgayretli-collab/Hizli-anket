<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Pro Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        /* Admin */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
        .admin-page.active { display: flex; }
        
        /* Çekmece Menü (Drawer) */
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 20px 20px 0 0; transition: 0.3s; border-top: 2px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1999; }
        .drawer-overlay.active { display: block; }

        /* Butonlar & Inputlar */
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1rem; }
        .action-btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .punto-select { background: #0f172a; color: white; border: 1px solid #374151; border-radius: 4px; padding: 4px; }
        
        /* Bekleme Ekranı Araçları */
        .line-tools { display: flex; gap: 15px; border-top: 1px solid #374151; padding-top: 10px; align-items: center; margin-top: 5px; color: #9ca3af; }
        .line-tools i { cursor: pointer; }
        .line-tools i.active { color: var(--success); }

        /* Liste Öğeleri */
        .list-item { background: var(--input-bg); border: 1px solid #475569; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .cat-combo { background: #0f172a; color: white; border: 1px solid #374151; padding: 4px; border-radius: 4px; font-size: 0.8rem; max-width: 120px; }

        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.05; background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <div id="v1" style="font-weight:bold;"></div>
        <div id="v2" style="font-weight:bold;"></div>
    </div>

    <button id="admin-trigger" onclick="checkAuth()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer">
        <div id="drawer-content"></div>
    </div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">Admin Panel</h3>
            <button class="admin-main-btn" onclick="alert('Başlatıldı')">Sahne Başlat <i class="fas fa-play"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="location.reload()">KAPAT</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı Araçları</h3>
            <div style="background:var(--input-bg); padding:15px; border-radius:10px;">
                <input type="text" id="i1" class="admin-input" placeholder="Satır 1">
                <div class="line-tools" id="t1">
                    <i class="fas fa-align-left" onclick="align(1,'left')"></i>
                    <i class="fas fa-align-center active" onclick="align(1,'center')"></i>
                    <i class="fas fa-align-right" onclick="align(1,'right')"></i>
                    <select id="s1" class="punto-select"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select>
                    <i class="fas fa-trash" onclick="document.getElementById('i1').value=''" style="margin-left:auto;"></i>
                </div>
            </div>
            <div style="background:var(--input-bg); padding:15px; border-radius:10px;">
                <input type="text" id="i2" class="admin-input" placeholder="Satır 2">
                <div class="line-tools" id="t2">
                    <i class="fas fa-align-left" onclick="align(2,'left')"></i>
                    <i class="fas fa-align-center active" onclick="align(2,'center')"></i>
                    <i class="fas fa-align-right" onclick="align(2,'right')"></i>
                    <select id="s2" class="punto-select"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select>
                    <i class="fas fa-trash" onclick="document.getElementById('i2').value=''" style="margin-left:auto;"></i>
                </div>
            </div>
            <button class="action-btn" style="background:var(--success);" onclick="pubWait()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar</h3>
            <button class="admin-main-btn" onclick="openPage('p-cats')">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-songs')">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-cats" class="admin-page">
            <h3>Kategoriler</h3>
            <button class="admin-main-btn" onclick="showNewCatDrawer()">Yeni Kategori <i class="fas fa-plus"></i></button>
            <div id="cat-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>

        <div id="p-songs" class="admin-page">
            <h3>Şarkılar</h3>
            <button class="admin-main-btn" onclick="showNewSongDrawer()">Yeni Şarkı Ekle <i class="fas fa-plus"></i></button>
            <div id="song-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [] };
        let aligns = { 1: 'center', 2: 'center' };

        socket.on('init_data', d => { db = d; renderAll(); });
        socket.on('bekleme_mesaji_guncelle', d => {
            const l1 = document.getElementById('v1'), l2 = document.getElementById('v2');
            l1.innerText = d.line1; l1.style.textAlign = d.align1; l1.style.fontSize = d.size1;
            l2.innerText = d.line2; l2.style.textAlign = d.align2; l2.style.fontSize = d.size2;
        });

        function align(l, t) {
            aligns[l] = t;
            const ts = document.getElementById(`t${l}`).querySelectorAll('i');
            ts.forEach(i => i.classList.remove('active'));
            document.querySelector(`#t${l} .fa-align-${t}`).classList.add('active');
        }

        function pubWait() {
            socket.emit('bekleme_mesaji_degistir', {
                line1: document.getElementById('i1').value, align1: aligns[1], size1: document.getElementById('s1').value,
                line2: document.getElementById('i2').value, align2: aligns[2], size2: document.getElementById('s2').value
            });
        }

        // Çekmece Yönetimi
        function openDrawer(html) {
            document.getElementById('drawer-content').innerHTML = html;
            document.getElementById('main-drawer').classList.add('active');
            document.getElementById('drawer-bg').classList.add('active');
        }
        function closeDrawer() {
            document.getElementById('main-drawer').classList.remove('active');
            document.getElementById('drawer-bg').classList.remove('active');
        }

        // Kategori İşlemleri
        function showNewCatDrawer() {
            openDrawer(`
                <h4>Yeni Kategori</h4>
                <input type="text" id="nc-name" class="admin-input" placeholder="Kategori Adı">
                <button class="action-btn" style="background:var(--success); margin-top:15px;" onclick="saveCat()">KAYDET</button>
            `);
        }
        function saveCat() {
            const name = document.getElementById('nc-name').value;
            if(!name) return;
            db.categories.push({id: Date.now(), name});
            socket.emit('db_update', db);
            closeDrawer();
        }
        function askDelCat(id) {
            openDrawer(`
                <h4 style="color:var(--danger)">Kategoriyi Sil?</h4>
                <p>Şarkılar kategorisiz kalacaktır.</p>
                <button class="action-btn" style="background:var(--danger)" onclick="confirmDelCat(${id})">EVET, SİL</button>
                <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="closeDrawer()">İPTAL</button>
            `);
        }
        function confirmDelCat(id) {
            db.categories = db.categories.filter(c => c.id !== id);
            db.songs.forEach(s => { if(s.catId == id) s.catId = null; });
            socket.emit('db_update', db);
            closeDrawer();
        }

        // Şarkı İşlemleri
        function showNewSongDrawer() {
            let opts = db.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            openDrawer(`
                <h4>Yeni Şarkı</h4>
                <input type="text" id="ns-name" class="admin-input" placeholder="Şarkı Adı">
                <select id="ns-cat" class="admin-input" style="margin-top:10px;">
                    <option value="">Kategori Seçin...</option>${opts}
                </select>
                <button class="action-btn" style="background:var(--success); margin-top:15px;" onclick="saveSong()">KAYDET</button>
            `);
        }
        function saveSong() {
            const name = document.getElementById('ns-name').value;
            const catId = document.getElementById('ns-cat').value;
            if(!name) return;
            db.songs.push({id: Date.now(), name, catId});
            socket.emit('db_update', db);
            closeDrawer();
        }
        function updateSongCat(sId, newCatId) {
            db.songs.find(s => s.id == sId).catId = newCatId;
            socket.emit('db_update', db);
        }
        function askDelSong(id) {
            openDrawer(`
                <h4 style="color:var(--danger)">Şarkıyı Sil?</h4>
                <button class="action-btn" style="background:var(--danger)" onclick="confirmDelSong(${id})">EVET, SİL</button>
                <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="closeDrawer()">İPTAL</button>
            `);
        }
        function confirmDelSong(id) {
            db.songs = db.songs.filter(s => s.id !== id);
            socket.emit('db_update', db);
            closeDrawer();
        }

        function renderAll() {
            // Kategoriler
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => `
                <div class="list-item"><span>${c.name}</span><i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="askDelCat(${c.id})"></i></div>
            `).join('');
            
            // Şarkılar
            document.getElementById('song-list-cont').innerHTML = db.songs.map(s => {
                let opts = db.categories.map(c => `<option value="${c.id}" ${s.catId == c.id ? 'selected' : ''}>${c.name}</option>`).join('');
                return `
                    <div class="list-item">
                        <span style="flex:1">${s.name}</span>
                        <select class="cat-combo" onchange="updateSongCat(${s.id}, this.value)">
                            <option value="">Kategorisiz</option>${opts}
                        </select>
                        <i class="fas fa-trash" style="color:var(--danger); cursor:pointer; margin-left:10px;" onclick="askDelSong(${s.id})"></i>
                    </div>
                `;
            }).join('');
        }

        function openPage(id) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function checkAuth() { if(prompt("Şifre") === "1167") document.getElementById('admin-portal').style.display='block'; }
    </script>
</body>
</html>
