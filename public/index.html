<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a; --panel-bg: #111827; --input-bg: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; font-size: 1.2rem; font-weight: bold; }
        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.4rem; z-index: 1001; animation: blinker 1s linear infinite; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Admin & UI */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; width: 100%; margin-bottom: 12px; min-height: 65px; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Result Bar Style */
        .res-bar-bg { background: #374151; height: 25px; border-radius: 5px; margin-top: 5px; overflow: hidden; position: relative; }
        .res-bar-fill { background: var(--primary); height: 100%; transition: 0.5s; }
        .res-percent { position: absolute; right: 10px; top: 0; font-size: 0.8rem; line-height: 25px; font-weight: bold; }

        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 12px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid #374151; }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>

    <div class="content">
        <div id="waiting-area" style="width:100%">
            <div id="v1" class="waiting-line"></div>
            <div id="v2" class="waiting-line"></div>
        </div>
        <div id="poll-view">
            <h2 id="poll-title">Sıradaki Şarkıyı Seç!</h2>
            <div id="poll-options-list"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()" style="position:fixed; top:15px; right:15px; z-index:100; opacity:0.1; background:none; border:none; color:white; font-size:1.8rem;"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center; margin-bottom: 25px;">Istek Portal - Yönetim</h3>
            
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>

            <div id="active-scene-controls" style="display:none; flex-direction:column; width:100%;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background: var(--primary);">Oylama Oluştur <i class="fas fa-poll-h"></i></button>
                <button id="btn-view-results" class="admin-main-btn" onclick="openPage('p-poll-results')" style="background: var(--primary);">Sonuç İzle <i class="fas fa-chart-line"></i></button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left: 5px solid var(--danger); margin-top: 10px;">Sahne Bitir <i class="fas fa-stop"></i></button>
            </div>

            <div id="standard-menu" style="width:100%;">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            </div>
            <button id="btn-close-panel" class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-poll-results" class="admin-page">
            <h3>Canlı Oylama Sonuçları</h3>
            <div id="live-results-list"></div>
            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="askFinishPoll()">OYLAMAYI BİTİR</button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı Düzenle</h3>
            <div style="background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:12px;"><input type="text" id="i1" class="admin-input" placeholder="Satır 1"><div class="line-tools" id="t1"><i class="fas fa-align-left" onclick="align(1,'left')"></i><i class="fas fa-align-center" onclick="align(1,'center')"></i><i class="fas fa-align-right" onclick="align(1,'right')"></i><select id="s1" style="background:#0f172a; color:white; border:1px solid #374151; padding:5px; border-radius:4px;"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select></div></div>
            <div style="background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:12px;"><input type="text" id="i2" class="admin-input" placeholder="Satır 2"><div class="line-tools" id="t2"><i class="fas fa-align-left" onclick="align(2,'left')"></i><i class="fas fa-align-center" onclick="align(2,'center')"></i><i class="fas fa-align-right" onclick="align(2,'right')"></i><select id="s2" style="background:#0f172a; color:white; border:1px solid #374151; padding:5px; border-radius:4px;"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select></div></div>
            <button class="action-btn" style="background:var(--success); margin-bottom:10px;" onclick="pubWait()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar Yönetimi</h3>
            <button class="admin-main-btn" onclick="openPage('p-cats')">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-songs')">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>
        <div id="p-cats" class="admin-page"><h3>Kategoriler</h3><div id="cat-list-cont"></div><button class="action-btn" onclick="openPage('p-repertuar')">GERİ</button></div>
        <div id="p-songs" class="admin-page"><h3>Şarkılar</h3><div id="song-list-cont"></div><button class="action-btn" onclick="openPage('p-repertuar')">GERİ</button></div>
        <div id="p-poll-create" class="admin-page"><h3>Oylama Seçenekleri</h3><div id="poll-selection-cont"></div><button class="action-btn" style="background:var(--success); margin-top:20px;" onclick="sendPoll()">ANKETİ BAŞLAT</button><button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">VAZGEÇ</button></div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, lastManual: {line1:"HOŞ GELDİNİZ", align1:"center", size1:"1.5rem", line2:"MÜZİK BAŞLAMAK ÜZERE", align2:"center", size2:"1.5rem"}, activePoll: null };
        let tempAligns = { 1: 'center', 2: 'center' };

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });
        socket.on('start_poll', p => { db.activePoll = p; updateUIState(); });
        socket.on('poll_update', p => { db.activePoll = p; if(document.getElementById('p-poll-results').classList.contains('active')) renderResults(); updateUIState(); });
        
        socket.on('bekleme_mesaji_guncelle', d => {
            const v1 = document.getElementById('v1'), v2 = document.getElementById('v2');
            v1.innerText = d.line1; v1.style.textAlign = d.align1; v1.style.fontSize = d.size1;
            v2.innerText = d.line2; v2.style.textAlign = d.align2; v2.style.fontSize = d.size2;
            if(!db.sceneActive) db.lastManual = d;
        });

        function updateUIState() {
            const isLive = db.sceneActive;
            const hasPoll = db.activePoll !== null;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('btn-view-results').disabled = !hasPoll;

            if(hasPoll) {
                showPollToUser(db.activePoll);
            } else {
                document.getElementById('poll-view').style.display = 'none';
                document.getElementById('waiting-area').style.display = 'block';
            }
        }

        function renderResults() {
            if(!db.activePoll) return;
            const total = db.activePoll.options.reduce((a, b) => a + (b.votes || 0), 0);
            document.getElementById('live-results-list').innerHTML = `<div style="text-align:center; margin-bottom:15px; color:var(--success)">Toplam Oy: ${total}</div>` + 
                db.activePoll.options.map(opt => {
                    const perc = total > 0 ? Math.round((opt.votes / total) * 100) : 0;
                    return `<div style="margin-bottom:15px;"><div>${opt.name} (${opt.votes || 0} Oy)</div><div class="res-bar-bg"><div class="res-bar-fill" style="width:${perc}%"></div><div class="res-percent">%${perc}</div></div></div>`;
                }).join('');
        }

        function askFinishPoll() {
            if(!db.activePoll) return;
            const winner = [...db.activePoll.options].sort((a,b) => b.votes - a.votes)[0];
            openDrawer(`<h4>Oylama Bitirilsin mi?</h4><p>Kazanan: <b>${winner.name}</b></p><button class="action-btn" style="background:var(--success)" onclick="confirmFinishPoll()">EVET, BİTİR VE YAYINLA</button>`);
        }

        function confirmFinishPoll() {
            socket.emit('finish_poll'); // Sunucu tarafında oylamayı temizle
            db.activePoll = null;
            closeDrawer();
            openPage('p-main');
            updateUIState();
        }

        function askEndScene() {
            openDrawer(`<h4>Sahne Bitir?</h4><input type="password" id="end-pw" class="admin-input"><button class="action-btn" style="background:var(--danger)" onclick="confirmEndScene()">BİTİR</button>`);
        }

        function confirmEndScene() {
            if(document.getElementById('end-pw').value === '1167') {
                db.sceneActive = false;
                db.activePoll = null;
                socket.emit('db_update', db);
                socket.emit('bekleme_mesaji_degistir', db.lastManual); // Manuel mesaja dön
                closeDrawer();
                location.reload();
            }
        }

        function showPollToUser(poll) {
            document.getElementById('waiting-area').style.display = 'none';
            const v = document.getElementById('poll-view');
            v.style.display = 'flex';
            document.getElementById('poll-options-list').innerHTML = poll.options.map(o => `<div class="poll-card" onclick="castVote('${o.id}')">${o.name}</div>`).join('');
        }

        function castVote(id) { socket.emit('submit_vote', id); document.getElementById('poll-view').innerHTML = "<h2>Oyun Alındı!</h2>"; }
        function sendPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({ id: cb.value, name: cb.getAttribute('data-name'), votes: 0 }));
            if(sel.length < 2) return alert("En az 2 şarkı!");
            db.activePoll = { options: sel, id: Date.now() };
            socket.emit('start_poll', db.activePoll);
            openPage('p-main');
        }

        function askStartScene() { openDrawer(`<h4>Sahne Başlat?</h4><button class="action-btn" style="background:var(--success)" onclick="db.sceneActive=true;socket.emit('db_update',db);updateUIState();closeDrawer();socket.emit('bekleme_mesaji_degistir',{line1:'SIRADAKİ OYLAMAYA KADAR',align1:'center',size1:'1.5rem',line2:'MÜZİĞİN KEYFİNİ ÇIKAR',align2:'center',size2:'1.5rem'});">BAŞLAT</button>`); }
        function showAuthDrawer() { openDrawer(`<h4>Giriş</h4><input type="password" id="admin-pw" class="admin-input"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`); }
        function checkAuth() { if(document.getElementById('admin-pw').value === "1167") { closeDrawer(); document.getElementById('admin-portal').style.display = 'block'; } }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='p-poll-results') renderResults(); renderAll(); }
        function align(l, t) { tempAligns[l] = t; }
        function pubWait() { socket.emit('bekleme_mesaji_degistir', { line1: document.getElementById('i1').value, align1: tempAligns[1], size1: document.getElementById('s1').value, line2: document.getElementById('i2').value, align2: tempAligns[2], size2: document.getElementById('s2').value }); }
        function openDrawer(h) { document.getElementById('drawer-content').innerHTML = h; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
        
        function renderAll() {
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} (${songs.length})</button><div class="cat-songs">${songs.map(s => `<div class="list-item"><span>${s.name}</span></div>`).join('')}</div></div>`;
            }).join('');
            document.getElementById('song-list-cont').innerHTML = db.songs.map(s => `<div class="list-item"><span>${s.name}</span></div>`).join('');
            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return songs.length ? `<div class="cat-box"><div class="cat-btn">${c.name}</div><div class="cat-songs active">${songs.map(s => `<div class="list-item"><span>${s.name}</span><input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}"></div>`).join('')}</div></div>` : '';
            }).join('');
        }
    </script>
</body>
</html>
