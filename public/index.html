<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Modern Anket Uygulaması</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: url('image1.png') no-repeat center center fixed;
      background-size: cover;
      color: #f8fafc;
      font-family:'Segoe UI',sans-serif;
      margin:0;
    }
    #status { font-size:1.4rem; text-align:center; margin-top:20px; color:#38bdf8; display:none; }
    .menu-btn {
      width:80%;
      max-width:600px;
      padding:20px;
      margin:20px 0;
      border:none;
      border-radius:16px;
      background:#1e293b;
      color:white;
      font-size:1.4rem;
      font-weight:bold;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:center;
      transition: background 0.3s, transform 0.2s;
    }
    .menu-btn:hover { background:#334155; transform:scale(1.03); }
    .layer {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(15,23,42,0.9);
      backdrop-filter: blur(12px);
      z-index:100;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    #live-indicator {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 1.4rem;
      font-weight: bold;
      color: red;
      display:none;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity:0; } }
    #message-panel {
      display:none;
      margin-top:15px;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      width:80%;
      max-width:600px;
    }
    #msg-input {
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
      font-size:1.1rem;
    }
    .toggle-btn {
      display:flex;
      align-items:center;
      justify-content:space-between;
      width:80%;
      max-width:600px;
      font-size:1.3rem;
    }
  </style>
</head>
<body>
  <div id="status"></div>
  <div id="options"></div>

  <div id="live-indicator">LIVE</div>

  <!-- Başlangıçta sadece Repertuar butonu -->
  <div id="layer-main" class="layer" style="display:flex;">
    <button id="btn-repertuar" class="menu-btn" onclick="openRepertuar()"><i class="fas fa-music"></i> REPERTUAR</button>
  </div>

  <!-- Repertuar ekranı -->
  <div id="layer-repertuar" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeLayer('layer-repertuar')"></i><h2>REPERTUAR</h2></div>
    <button class="menu-btn" onclick="startScene()"><i class="fas fa-microphone"></i> SAHNEYİ BAŞLAT</button>
    <div class="toggle-btn menu-btn" onclick="toggleMessagePanel()">
      <span><i class="fas fa-edit"></i> BEKLEME METNİ</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div id="message-panel">
      <input type="text" id="msg-input" placeholder="Bekleme mesajı yaz">
      <button class="menu-btn" style="background:#38bdf8" onclick="publishMessage()"><i class="fas fa-paper-plane"></i> YAYINLA</button>
    </div>
    <button class="menu-btn"><i class="fas fa-cogs"></i> MEKAN AYARLARI</button>
    <button class="menu-btn"><i class="fas fa-folder"></i> KATEGORİLER</button>
    <button class="menu-btn"><i class="fas fa-music"></i> ŞARKILAR</button>
    <button class="menu-btn" style="background:#ef4444" onclick="stopScene()"><i class="fas fa-stop"></i> SAHNEYİ BİTİR</button>
  </div>

<script>
const socket = io();

function startScene() {
  const pass = prompt("Sahne başlat şifresi:");
  if(pass !== "1167") { alert("Yanlış şifre!"); return; }
  socket.emit('sahne_durumu_degistir', true);
}

function stopScene() {
  const pass = prompt("Sahne bitir şifresi:");
  if(pass !== "1167") { alert("Yanlış şifre!"); return; }
  socket.emit('sahne_durumu_degistir', false);
}

function toggleMessagePanel() {
  const panel = document.getElementById('message-panel');
  panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
}

function publishMessage() {
  const msg = document.getElementById('msg-input').value;
  socket.emit('bekleme_mesaji_degistir', msg);
  document.getElementById('message-panel').style.display = 'none';
}

function openRepertuar() {
  document.getElementById('layer-repertuar').style.display = 'flex';
}
function closeLayer(id) {
  document.getElementById(id).style.display = 'none';
}

// Gelen verileri tüm cihazlarda göster
socket.on('sahne_durumu_guncelle', (isActive) => {
  if(isActive) {
    document.getElementById('live-indicator').style.display = 'block';
  } else {
    document.getElementById('live-indicator').style.display = 'none';
  }
});
socket.on('bekleme_mesaji_guncelle', (msg) => {
  document.getElementById('status').innerText = msg;
  document.getElementById('status').style.display = 'block';
});
</script>
</body>
</html>
