<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Etkileşim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; padding: 20px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        
        /* İzleyici Ekranı */
        #waiting-display { transition: all 0.3s; width: 100%; }
        .waiting-line { margin: 5px 0; min-height: 1.2rem; display: block; width: 100%; line-height: 1.2; }

        /* Admin Portalı */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .admin-page.active { display: flex; }

        /* Butonlar */
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .action-btn { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Kategori Listesi ve Formlar */
        .cat-item { background: var(--input-bg); border-radius: 8px; margin-bottom: 10px; overflow: hidden; border: 1px solid #374151; }
        .cat-header { padding: 15px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }
        .cat-content { display: none; padding: 15px; background: #1a2233; border-top: 1px solid #374151; }
        .cat-content.active { display: block; }
        
        .new-form { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; border: 1px solid var(--primary); }
        .new-form.active { display: block; }
        
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        .song-item { padding: 8px; border-bottom: 1px solid #334155; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .song-item:last-child { border: none; }

        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">
    <div class="overlay"></div>

    <div class="content">
        <div id="waiting-display">
            <div id="line1-view" class="waiting-line"></div>
            <div id="line2-view" class="waiting-line"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="checkAdminPassword()"><i class="fas fa-cog"></i></button>

    <div id="admin-portal">
        <div id="page-main" class="admin-page active">
            <h3 style="text-align:center;"><i class="fas fa-cog"></i> Admin Panel</h3>
            <button class="admin-main-btn" onclick="startScene()">Sahne Başlat <i class="fas fa-play"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            <button class="admin-main-btn" style="margin-top:20px;" onclick="closePortal()">İzleyici Sayfasına Dön <i class="fas fa-arrow-left"></i></button>
        </div>

        <div id="page-repertuar" class="admin-page">
            <h3><i class="fas fa-music"></i> Repertuar Düzenle</h3>
            <button class="admin-main-btn">Mekan Şablonları <i class="fas fa-building"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-categories')">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background: var(--input-bg);" onclick="openPage('page-main')">GERİ</button>
        </div>

        <div id="page-categories" class="admin-page">
            <h3><i class="fas fa-list"></i> Kategoriler</h3>
            
            <button class="admin-main-btn" style="border-color: var(--primary);" onclick="toggleNewCatForm(event)">
                + Yeni Kategori <i class="fas fa-plus"></i>
            </button>

            <div id="new-cat-form" class="new-form" onclick="event.stopPropagation()">
                <input type="text" id="cat-name-input" class="admin-input" placeholder="Kategori Adı">
                <button class="action-btn" style="background: var(--success); width: 100%;" onclick="saveCategory()">KAYDET</button>
            </div>

            <div id="category-list-container">
                </div>

            <button class="action-btn" style="background: var(--input-bg);" onclick="openPage('page-repertuar')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        const ADMIN_PASS = "1167";
        let db = { categories: [], songs: [] };

        socket.on('init_data', data => { db = data; renderCategories(); });

        function handleGlobalClick(e) {
            // Ekranda başka bir yere tıklandığında formu kapat
            const form = document.getElementById('new-cat-form');
            if (form.classList.contains('active') && !e.target.closest('.admin-main-btn')) {
                form.classList.remove('active');
            }
        }

        function toggleNewCatForm(e) {
            e.stopPropagation();
            const form = document.getElementById('new-cat-form');
            form.classList.toggle('active');
            if(form.classList.contains('active')) document.getElementById('cat-name-input').focus();
        }

        function openPage(pageId) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function checkAdminPassword() {
            const pass = prompt("Şifre:");
            if (pass === ADMIN_PASS) { document.getElementById('admin-portal').style.display = 'block'; openPage('page-main'); }
        }

        function closePortal() { document.getElementById('admin-portal').style.display = 'none'; }

        // Kategori İşlemleri
        function saveCategory() {
            const name = document.getElementById('cat-name-input').value.trim();
            if(!name) return;
            const newCat = { id: Date.now(), name: name };
            db.categories.push(newCat);
            socket.emit('db_update', db);
            document.getElementById('cat-name-input').value = '';
            document.getElementById('new-cat-form').classList.remove('active');
            renderCategories();
        }

        function deleteCategory(id) {
            if(confirm('Kategoriyi silmek istediğinize emin misiniz? Şarkılar kategorisiz kalacaktır.')) {
                db.categories = db.categories.filter(c => c.id !== id);
                // Bu kategoriye ait şarkıların categoryId'sini temizle
                db.songs.forEach(s => { if(s.categoryId === id) delete s.categoryId; });
                socket.emit('db_update', db);
                renderCategories();
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-list-container');
            container.innerHTML = db.categories.map(cat => `
                <div class="cat-item">
                    <div class="cat-header" onclick="this.nextElementSibling.classList.toggle('active')">
                        <span>${cat.name}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="cat-content">
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <button class="action-btn" style="background:var(--primary); flex:1; margin-top:0;">Şarkı Ekle</button>
                            <button class="action-btn" style="background:var(--danger); flex:1; margin-top:0;" onclick="deleteCategory(${cat.id})">Kategoriyi Sil</button>
                        </div>
                        <div class="cat-songs">
                            ${db.songs.filter(s => s.categoryId === cat.id).map(s => `
                                <div class="song-item">
                                    <span>${s.name}</span>
                                    <i class="fas fa-times" style="color:var(--danger)"></i>
                                </div>
                            `).join('') || '<small style="color:#6b7280">Bu kategoride şarkı yok.</small>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Mevcut Fonksiyonlar ---
        function startScene() { alert("Sahne Başlatıldı!"); }
        function publishWaiting() {
            const data = {
                line1: document.getElementById('input-line1').value,
                align1: 'center', // Basitlik için
                line2: document.getElementById('input-line2').value,
                align2: 'center'
            };
            socket.emit('bekleme_mesaji_degistir', data);
            alert("Yayınlandı!");
        }
        socket.on('bekleme_mesaji_guncelle', (data) => {
            document.getElementById('line1-view').innerText = data.line1 || '';
            document.getElementById('line2-view').innerText = data.line2 || '';
        });
    </script>
</body>
</html>
