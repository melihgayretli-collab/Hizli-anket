<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* Bekleme Metni */
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }

        /* Kullanıcı Oylama Kartları */
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 12px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
        .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(79, 70, 229, 0.35); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 0; }
        .poll-info { display: flex; justify-content: space-between; position: relative; z-index: 1; font-weight: bold; font-size: 1.1rem; }

        /* Admin Paneli */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; min-height: 65px; font-size: 1.05rem; }
        .admin-main-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Çekmece */
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }
        
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.2rem; z-index: 1001; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; font-size: 1.8rem; }
        
        .history-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; border-left: 3px solid var(--success); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>

    <div class="content">
        <div id="waiting-area" style="width:100%">
            <div id="v1" class="waiting-line"></div>
            <div id="v2" class="waiting-line"></div>
        </div>
        <div id="poll-view">
            <h2 id="poll-header">Sıradaki Şarkıyı Seç!</h2>
            <div id="poll-options-list"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">Sahne Yönetimi</h3>
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>
            <div id="active-scene-controls" style="display:none; flex-direction:column;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background: var(--primary);">Oylama Oluştur <i class="fas fa-poll-h"></i></button>
                <button id="btn-view-results" class="admin-main-btn" onclick="openPage('p-poll-results')" style="background: var(--primary);">Sonuç İzle <i class="fas fa-chart-line"></i></button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left: 5px solid var(--danger); margin-top: 10px;">Sahne Bitir <i class="fas fa-stop"></i></button>
            </div>
            <div id="standard-menu">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle</button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle</button>
            </div>
            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-poll-results" class="admin-page">
            <h3>Canlı Oylama Sonuçları</h3>
            <div id="admin-results-list" style="margin-bottom:20px;"></div>
            <button class="action-btn" style="background:var(--danger);" onclick="askFinishPoll()">OYLAMAYI BİTİR</button>
            <h4 style="margin-top:30px; color:#9ca3af;">Oylama Geçmişi</h4>
            <div id="poll-history-list"></div>
            <button class="action-btn" style="background:var(--input-bg); margin-top:20px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-poll-create" class="admin-page">
            <h3>Şarkı Seçimi</h3>
            <div id="poll-selection-cont"></div>
            <button class="action-btn" style="background:var(--success);" onclick="sendPoll()">ANKETİ BAŞLAT</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">VAZGEÇ</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı Düzenle</h3>
            <input type="text" id="i1" class="admin-input" placeholder="Satır 1">
            <input type="text" id="i2" class="admin-input" placeholder="Satır 2">
            <button class="action-btn" style="background:var(--success);" onclick="pubWait()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>
        <div id="p-repertuar" class="admin-page"><h3>Repertuar</h3><button class="action-btn" onclick="openPage('p-main')">GERİ</button></div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, lastManual: {line1:"", line2:""}, activePoll: null, pollHistory: [] };
        let myVote = null;

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });

        socket.on('poll_update', pollData => {
            db.activePoll = pollData;
            if(db.activePoll) {
                showPollToUser(db.activePoll);
                if(document.getElementById('p-poll-results').classList.contains('active')) renderAdminResults();
            }
        });

        socket.on('poll_finished', winnerName => {
            db.activePoll = null;
            myVote = null;
            const view = document.getElementById('poll-view');
            view.innerHTML = `<h2 style="color:var(--success)">Sıradaki Şarkı:</h2><h1 style="font-size:2.5rem; margin-top:10px;">${winnerName}</h1>`;
            
            setTimeout(() => {
                view.style.display = 'none';
                document.getElementById('waiting-area').style.display = 'block';
                // Otomatik Metin Dönüşü
                applyMsg({line1:"SIRADAKİ OYLAMAYA KADAR", line2:"MÜZİĞİN KEYFİNİ ÇIKAR"});
            }, 10000);
        });

        socket.on('bekleme_mesaji_guncelle', d => {
            applyMsg(d);
            if(!db.sceneActive) db.lastManual = d;
        });

        function applyMsg(d) {
            document.getElementById('v1').innerText = d.line1 || "";
            document.getElementById('v2').innerText = d.line2 || "";
        }

        function showPollToUser(poll) {
            document.getElementById('waiting-area').style.display = 'none';
            const view = document.getElementById('poll-view');
            view.style.display = 'flex';
            const list = document.getElementById('poll-options-list');
            const total = poll.options.reduce((a, b) => a + (b.votes || 0), 0);

            list.innerHTML = poll.options.map(opt => {
                const perc = total > 0 ? Math.round((opt.votes / total) * 100) : 0;
                return `
                    <div class="poll-card" onclick="${myVote ? '' : `castVote('${opt.id}')`}">
                        <div class="progress-bar" style="width:${myVote ? perc : 0}%"></div>
                        <div class="poll-info">
                            <span>${opt.name}</span>
                            ${myVote ? `<span>%${perc}</span>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        function castVote(sId) {
            myVote = sId;
            socket.emit('submit_vote', sId);
        }

        function renderAdminResults() {
            const poll = db.activePoll;
            if(!poll) return;
            const total = poll.options.reduce((a, b) => a + (b.votes || 0), 0);
            document.getElementById('admin-results-list').innerHTML = poll.options.map(opt => {
                const perc = total > 0 ? Math.round((opt.votes / total) * 100) : 0;
                return `<div style="margin-bottom:15px;"><span>${opt.name} (%${perc})</span><div style="background:#374151; height:8px; border-radius:4px; margin-top:5px;"><div style="background:var(--success); width:${perc}%; height:100%; border-radius:4px; transition:0.3s;"></div></div></div>`;
            }).join('');
        }

        function sendPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({ id: cb.value, name: cb.getAttribute('data-name'), votes: 0 }));
            if(sel.length < 2) {
                openDrawer(`<h4>Uyarı</h4><p>Lütfen en az 2 şarkı seçiniz!</p><button class="action-btn" style="background:var(--primary)" onclick="closeDrawer()">TAMAM</button>`);
                return;
            }
            db.activePoll = { options: sel, id: Date.now() };
            socket.emit('db_update', db);
            socket.emit('start_poll', db.activePoll);
            openPage('p-main');
        }

        function askFinishPoll() {
            openDrawer(`<h4>Oylamayı Bitir?</h4><p>En yüksek oyu alan şarkı kullanıcılara duyurulacak.</p><button class="action-btn" style="background:var(--danger)" onclick="confirmFinishPoll()">BİTİR VE YAYINLA</button>`);
        }

        function confirmFinishPoll() {
            const winner = [...db.activePoll.options].sort((a,b) => b.votes - a.votes)[0];
            const total = db.activePoll.options.reduce((a, b) => a + (b.votes || 0), 0);
            const winnerPerc = total > 0 ? Math.round((winner.votes / total) * 100) : 0;
            
            db.pollHistory.push(`Oylama ${db.pollHistory.length + 1} - %${winnerPerc} ${winner.name}`);
            socket.emit('finish_poll', winner.name);
            db.activePoll = null;
            socket.emit('db_update', db);
            closeDrawer();
            openPage('p-main');
        }

        function updateUIState() {
            const isLive = db.sceneActive;
            const hasPoll = db.activePoll !== null;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('btn-create-poll').disabled = hasPoll;
            document.getElementById('btn-view-results').disabled = !hasPoll;

            if(!isLive) {
                applyMsg(db.lastManual);
            }
            // Geçmişi Render Et
            document.getElementById('poll-history-list').innerHTML = db.pollHistory.map(h => `<div class="history-item">${h}</div>`).reverse().join('');
        }

        // --- Altyapı Fonksiyonları ---
        function askStartScene() { openDrawer(`<h4>Sahne Başlat?</h4><button class="action-btn" style="background:var(--success)" onclick="db.sceneActive=true;socket.emit('db_update',db);updateUIState();closeDrawer();socket.emit('bekleme_mesaji_degistir',{line1:'SIRADAKİ OYLAMAYA KADAR',line2:'MÜZİĞİN KEYFİNİ ÇIKAR'});">BAŞLAT</button>`); }
        function askEndScene() { openDrawer(`<h4>Sahne Bitir?</h4><input type="password" id="end-pw" class="admin-input" placeholder="Şifre"><button class="action-btn" style="background:var(--danger)" onclick="if(document.getElementById('end-pw').value==='1167'){db.sceneActive=false;db.activePoll=null;socket.emit('db_update',db);updateUIState();closeDrawer();}">BİTİR</button>`); }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='p-poll-results') renderAdminResults(); renderAll(); }
        function renderAll() { 
            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} <i class="fas fa-chevron-down"></i></button><div class="cat-songs">${songs.map(s => `<div class="list-item" style="display:flex; justify-content:space-between; padding:8px;"><span>${s.name}</span><input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}" style="width:20px; height:20px;"></div>`).join('')}</div></div>`;
            }).join('');
        }
        function pubWait() { socket.emit('bekleme_mesaji_degistir', { line1: document.getElementById('i1').value, line2: document.getElementById('i2').value }); }
        function showAuthDrawer() { openDrawer(`<h4>Giriş</h4><input type="password" id="admin-pw" class="admin-input"><button class="action-btn" style="background:var(--primary)" onclick="if(document.getElementById('admin-pw').value==='1167'){closeDrawer();document.getElementById('admin-portal').style.display='block';}">GİRİŞ</button>`); }
        function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
    </script>
</body>
</html>
