<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a; --panel-bg: #111827; --input-bg: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; font-size: 1.2rem; font-weight: bold; }
        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.4rem; z-index: 1001; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; width: 100%; margin-bottom: 12px; }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 10px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
        .search-container { position: sticky; top: 0; background: var(--panel-bg); z-index: 5; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>
    <div class="content">
        <div id="waiting-area" style="width:100%"><div id="v1" class="waiting-line"></div><div id="v2" class="waiting-line"></div></div>
        <div id="poll-view"><h2 id="poll-title">Sıradaki Şarkıyı Seç!</h2><div id="poll-options-list"></div></div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>
    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">Yönetim Paneli</h3>
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left:5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>
            <div id="active-scene-controls" style="display:none; flex-direction:column;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background:var(--primary);">Oylama Oluştur <i class="fas fa-poll-h"></i></button>
                <button id="btn-results" class="admin-main-btn" onclick="openPage('p-results')" style="background:var(--primary);">Sonuç / Geçmiş <i class="fas fa-chart-line"></i></button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left:5px solid var(--danger); margin-top:10px;">Sahne Bitir <i class="fas fa-stop"></i></button>
            </div>
            <div id="standard-menu">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle</button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle</button>
            </div>
            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-poll-create" class="admin-page">
            <div class="search-container">
                <h3>Oylama Seçenekleri</h3>
                <input type="text" id="song-search" class="admin-input" placeholder="Şarkı veya kategori ara..." oninput="filterPollSongs(this.value)">
            </div>
            <div id="poll-selection-cont"></div>
            <button class="action-btn" style="background:var(--success)" onclick="sendPoll()">ANKETİ BAŞLAT</button>
            <button class="action-btn" style="background:var(--input-bg)" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-results" class="admin-page">
            <h3>Canlı Sonuçlar</h3>
            <div id="results-cont"></div>
            <button id="finish-poll-btn" class="action-btn" style="background:var(--danger); display:none;" onclick="finishPoll()">OYLAMAYI BİTİR VE KAYDET</button>
            <hr style="margin:20px 0; opacity:0.2;">
            <h4>Oylama Geçmişi (Bu Sahne)</h4>
            <div id="history-list"></div>
            <button class="action-btn" style="background:var(--input-bg); margin-top:20px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Kategoriler</h3>
            <div id="cat-list-cont"></div>
            <div style="margin-top:20px; padding:15px; background:var(--input-bg); border-radius:10px;">
                <input type="text" id="new-cat-name" class="admin-input" placeholder="Kategori Adı">
                <button class="action-btn" style="background:var(--success)" onclick="addCat()">KATEGORİ EKLE</button>
            </div>
            <button class="action-btn" style="background:var(--input-bg)" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı Düzenle</h3>
            <input type="text" id="i1" class="admin-input" placeholder="Satır 1">
            <select id="a1" class="admin-input"><option value="left">Sol</option><option value="center" selected>Orta</option><option value="right">Sağ</option></select>
            <input type="text" id="s1" class="admin-input" value="1.5rem" placeholder="Boyut (örn: 1.5rem)">
            <input type="text" id="i2" class="admin-input" placeholder="Satır 2" style="margin-top:10px;">
            <select id="a2" class="admin-input"><option value="left">Sol</option><option value="center" selected>Orta</option><option value="right">Sağ</option></select>
            <input type="text" id="s2" class="admin-input" value="1.5rem">
            <button class="action-btn" style="background:var(--success)" onclick="pubWait()">GÜNCELLE</button>
            <button class="action-btn" style="background:var(--input-bg)" onclick="openPage('p-main')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, activePoll: null, history: [], usedSongs: [] };

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });
        socket.on('poll_update', pollData => { db.activePoll = pollData; if(document.getElementById('p-results').classList.contains('active')) renderResults(); updateUIState(); });
        socket.on('bekleme_mesaji_guncelle', d => { 
            document.getElementById('v1').innerText = d.line1; document.getElementById('v1').style.textAlign = d.align1; document.getElementById('v1').style.fontSize = d.size1;
            document.getElementById('v2').innerText = d.line2; document.getElementById('v2').style.textAlign = d.align2; document.getElementById('v2').style.fontSize = d.size2;
            document.getElementById('i1').value = d.line1; document.getElementById('i2').value = d.line2;
        });

        function showAuthDrawer() { openDrawer(`<h4>Giriş</h4><input type="password" id="admin-pw" class="admin-input"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`); }
        function checkAuth() { if(document.getElementById('admin-pw').value === "1167") { closeDrawer(); document.getElementById('admin-portal').style.display = 'block'; } else { alert("Hatalı!"); } }
        function askStartScene() { openDrawer(`<h4>Sahne Başlatılsın mı?</h4><button class="action-btn" style="background:var(--success)" onclick="confirmStartScene()">BAŞLAT</button>`); }
        function confirmStartScene() { db.sceneActive = true; socket.emit('db_update', db); closeDrawer(); }
        function askEndScene() { openDrawer(`<h4>Sahne Bitir?</h4><input type="password" id="end-pw" class="admin-input"><button class="action-btn" style="background:var(--danger)" onclick="confirmEndScene()">BİTİR</button>`); }
        function confirmEndScene() { if(document.getElementById('end-pw').value === '1167') { db.sceneActive = false; socket.emit('db_update', db); closeDrawer(); setTimeout(() => location.reload(), 500); } }

        function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }

        function filterPollSongs(val) {
            const q = val.toLowerCase();
            document.querySelectorAll('#poll-selection-cont .cat-box').forEach(box => {
                let hasMatch = false;
                box.querySelectorAll('.list-item').forEach(item => {
                    const text = item.innerText.toLowerCase();
                    if(text.includes(q)) { item.style.display = 'flex'; hasMatch = true; }
                    else { item.style.display = 'none'; }
                });
                box.style.display = hasMatch ? 'block' : 'none';
                if(q.length > 0 && hasMatch) box.querySelector('.cat-songs').classList.add('active');
            });
        }

        function renderAll() {
            // Oylama Seçimi + Kilit Mantığı
            const used = db.usedSongs || [];
            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const sngs = db.songs.filter(s => s.catId == c.id);
                if(sngs.length === 0) return '';
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} <i class="fas fa-chevron-down"></i></button><div class="cat-songs">${sngs.map(s => {
                    const isUsed = used.includes(String(s.id));
                    return `<div class="list-item" style="${isUsed ? 'opacity:0.4; background:#000;' : ''}"><span>${s.name} ${isUsed ? ' (Çalındı)' : ''}</span><input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}" ${isUsed ? 'disabled' : ''} style="width:20px;height:20px;"></div>`;
                }).join('')}</div></div>`;
            }).join('');

            // Geçmiş Listesi
            document.getElementById('history-list').innerHTML = db.history?.length > 0 ? db.history.map(h => `<div class="list-item" style="border-left:4px solid var(--success)"><span>${h.songName}</span><span style="color:var(--success)">${h.votes} Oy</span></div>`).join('') : '<p style="opacity:0.5">Henüz çalınan şarkı yok.</p>';

            // Repertuar Düzenle
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => `
                <div class="cat-box">
                    <div class="list-item"><strong>${c.name}</strong><button onclick="delCat(${c.id})" style="background:none; border:none; color:var(--danger)"><i class="fas fa-trash"></i></button></div>
                    <div style="padding:10px;">
                        ${db.songs.filter(s => s.catId == c.id).map(s => `<div class="list-item" style="font-size:0.9rem">${s.name} <i class="fas fa-times" onclick="delSong(${s.id})" style="color:#6b7280"></i></div>`).join('')}
                        <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="ns-${c.id}" class="admin-input" style="margin:0; font-size:0.8rem;" placeholder="Şarkı adı..."><button class="action-btn" style="margin:0; width:50px; background:var(--success)" onclick="addSong(${c.id})">+</button></div>
                    </div>
                </div>
            `).join('');
        }

        function renderResults() {
            const cont = document.getElementById('results-cont');
            if(!db.activePoll) { cont.innerHTML = "<p>Aktif oylama yok.</p>"; return; }
            const total = db.activePoll.options.reduce((a, b) => a + (Number(b.votes) || 0), 0);
            cont.innerHTML = `<div style="text-align:center; margin-bottom:15px; font-weight:bold; color:var(--success)">TOPLAM: ${total} OY</div>` + db.activePoll.options.map(opt => {
                const perc = total > 0 ? Math.round(((Number(opt.votes) || 0) / total) * 100) : 0;
                return `<div style="margin-bottom:12px;"><div>${opt.name} (%${perc})</div><div style="background:#374151; height:8px; border-radius:4px; margin-top:4px;"><div style="background:var(--primary); height:100%; width:${perc}%; border-radius:4px; transition:0.5s;"></div></div></div>`;
            }).join('');
        }

        function finishPoll() {
            // Kazananı belirle ve geçmişe ekle
            const winner = [...db.activePoll.options].sort((a,b) => b.votes - a.votes)[0];
            if(winner && winner.votes > 0) {
                db.history = db.history || [];
                db.usedSongs = db.usedSongs || [];
                db.history.unshift({ songName: winner.name, votes: winner.votes });
                db.usedSongs.push(String(winner.id));
            }
            db.activePoll = null;
            socket.emit('db_update', db);
            openPage('p-main');
        }

        function updateUIState() {
            const isLive = db.sceneActive;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('finish-poll-btn').style.display = db.activePoll ? 'block' : 'none';
            
            if(db.activePoll) {
                document.getElementById('waiting-area').style.display = 'none';
                document.getElementById('poll-view').style.display = 'flex';
                if(!document.getElementById('poll-options-list').innerHTML.includes("Oyun Alındı")) {
                    document.getElementById('poll-options-list').innerHTML = db.activePoll.options.map(opt => `<div class="poll-card" onclick="castVote('${opt.id}')">${opt.name}</div>`).join('');
                }
            } else {
                document.getElementById('poll-view').style.display = 'none';
                document.getElementById('waiting-area').style.display = 'block';
            }
        }

        function pubWait() {
            socket.emit('bekleme_mesaji_degistir', { line1: document.getElementById('i1').value, align1: document.getElementById('a1').value, size1: document.getElementById('s1').value, line2: document.getElementById('i2').value, align2: document.getElementById('a2').value, size2: document.getElementById('s2').value });
            alert("Güncellendi!");
        }
        function castVote(sId) { socket.emit('submit_vote', sId); document.getElementById('poll-view').innerHTML = "<h2>Oyun Alındı!</h2><p>Teşekkürler</p>"; }
        function sendPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({ id: cb.value, name: cb.getAttribute('data-name'), votes: 0 }));
            if(sel.length < 2) return alert("En az 2 şarkı seç!");
            socket.emit('start_poll', { options: sel, id: Date.now() });
            openPage('p-main');
        }
        function addCat() { const n = document.getElementById('new-cat-name').value; if(!n) return; db.categories.push({id: Date.now(), name: n}); socket.emit('db_update', db); }
        function delCat(id) { db.categories = db.categories.filter(c => c.id != id); socket.emit('db_update', db); }
        function addSong(cId) { const n = document.getElementById(`ns-${cId}`).value; if(!n) return; db.songs.push({id: Date.now(), name: n, catId: cId}); socket.emit('db_update', db); }
        function delSong(id) { db.songs = db.songs.filter(s => s.id != id); socket.emit('db_update', db); }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); renderAll(); if(id==='p-results') renderResults(); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
    </script>
</body>
</html>
