<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --panel-bg: #111827; --input-bg: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .action-btn { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .cat-item { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 10px; }
        .cat-header { padding: 15px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }
        .cat-content { display: none; padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid #374151; }
        .cat-content.active { display: block; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body onclick="closeForm(event)">
    <div class="overlay"></div>
    <div class="content">
        <div id="line1-view" style="font-weight:bold;"></div>
        <div id="line2-view" style="font-weight:bold;"></div>
    </div>
    <button id="admin-trigger" onclick="checkPass()"><i class="fas fa-cog"></i></button>

    <div id="admin-portal">
        <div id="page-main" class="admin-page active">
            <h3 style="text-align:center;">Admin Panel</h3>
            <button class="admin-main-btn" onclick="openPage('page-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            <button class="action-btn" style="background:var(--danger);" onclick="location.reload()">KAPAT</button>
        </div>

        <div id="page-waiting" class="admin-page">
            <h3>Bekleme Ekranı</h3>
            <input type="text" id="in1" class="admin-input" placeholder="Satır 1">
            <input type="text" id="in2" class="admin-input" placeholder="Satır 2">
            <button class="action-btn" style="background:var(--success);" onclick="sendWaiting()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('page-main')">GERİ</button>
        </div>

        <div id="page-repertuar" class="admin-page">
            <h3>Kategoriler</h3>
            <button class="admin-main-btn" id="btn-add" onclick="event.stopPropagation(); document.getElementById('add-area').style.display='block'">+ Yeni Kategori <i class="fas fa-plus"></i></button>
            <div id="add-area" style="display:none; margin-top:10px;">
                <input type="text" id="new-cat-name" class="admin-input" placeholder="Kategori adı...">
                <button class="action-btn" style="background:var(--success);" onclick="addCat()">DİSKE KAYDET</button>
            </div>
            <div id="cat-list" style="margin-top:15px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('page-main')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [] };

        socket.on('init_data', data => { if(data) { db = data; render(); } });

        socket.on('bekleme_mesaji_guncelle', d => {
            document.getElementById('line1-view').innerText = d.line1;
            document.getElementById('line2-view').innerText = d.line2;
        });

        function addCat() {
            const name = document.getElementById('new-cat-name').value.trim();
            if(!name) return;
            db.categories.push({ id: Date.now(), name: name });
            socket.emit('db_update', db); // Sunucuya ve Render Disk'e gönderir
            document.getElementById('new-cat-name').value = '';
            document.getElementById('add-area').style.display = 'none';
        }

        function deleteCat(id) {
            if(confirm("Silinsin mi?")) {
                db.categories = db.categories.filter(c => c.id !== id);
                socket.emit('db_update', db);
            }
        }

        function render() {
            const list = document.getElementById('cat-list');
            list.innerHTML = db.categories.map(c => `
                <div class="cat-item">
                    <div class="cat-header" onclick="this.nextElementSibling.classList.toggle('active')">
                        ${c.name} <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="cat-content">
                        <button class="action-btn" style="background:var(--danger);" onclick="deleteCat(${c.id})">Sil</button>
                    </div>
                </div>
            `).join('');
        }

        function sendWaiting() {
            socket.emit('bekleme_mesaji_degistir', { line1: document.getElementById('in1').value, line2: document.getElementById('in2').value });
        }

        function openPage(id) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function checkPass() { if(prompt("Şifre:") === "1167") { document.getElementById('admin-portal').style.display='block'; } }
        function closeForm(e) { if(!e.target.closest('#add-area') && !e.target.closest('#btn-add')) document.getElementById('add-area').style.display='none'; }
    </script>
</body>
</html>
