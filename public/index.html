<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Etkileşim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background: #000 url('image1.png') no-repeat center center fixed; 
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }
        .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); z-index: 1; 
        }
        .content { position: relative; z-index: 10; padding: 20px; text-align: center; }
        
        /* Yayın Ekranları */
        #waiting-display { font-size: 2rem; margin-top: 20%; font-weight: bold; }
        #poll-display { display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-top: 10%; }
        
        .vote-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: var(--primary); border: none; color: white; border-radius: 8px; font-size: 1.2rem;
        }

        /* Admin Paneli (Sadece Yöneticiye Özel) */
        #admin-panel { 
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
        }
        .admin-btn { background: var(--danger); border: none; padding: 15px; border-radius: 50%; color: white; cursor: pointer; }
        
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--dark); padding: 20px; border-radius: 10px; z-index: 101; width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="content">
        <div id="waiting-display">
            <h2 id="waiting-text">Bekleme mesajı yükleniyor...</h2>
        </div>

        <div id="poll-display">
            <h2 id="poll-question">Hangi Şarkıyı Çalalım?</h2>
            <div id="poll-options"></div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="admin-btn" onclick="toggleAdmin()"><i class="fas fa-cog"></i></button>
    </div>

    <div id="admin-modal" class="modal">
        <h3>Yönetim Paneli</h3>
        
        <div style="margin-bottom: 20px;">
            <label>Bekleme Metni Gönder:</label>
            <input type="text" id="new-waiting-msg" style="width:100%; padding:8px; margin-top:5px;">
            <button onclick="updateWaitingMsg()" style="width:100%; margin-top:5px; background: var(--success); color:white; border:none; padding:8px;">Yayınla</button>
        </div>

        <div id="repertuar-ozet">
            <button onclick="renderAnketSecimi()" style="width:100%; background: var(--primary); color:white; border:none; padding:10px;">Anket Başlat</button>
        </div>
        
        <button onclick="toggleAdmin()" style="width:100%; margin-top:10px;">Kapat</button>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [] };

        socket.on('init_data', data => { db = data; });

        // MESAJ YAYINI: Herkeste aynı metni günceller
        socket.on('bekleme_mesaji_guncelle', (msg) => {
            document.getElementById('waiting-text').innerText = msg;
            document.getElementById('waiting-display').style.display = 'block';
            document.getElementById('poll-display').style.display = 'none';
        });

        // ANKET YAYINI: Herkeste anket ekranını açar
        socket.on('anket_guncelle', (poll) => {
            document.getElementById('waiting-display').style.display = 'none';
            document.getElementById('poll-display').style.display = 'block';
            const optDiv = document.getElementById('poll-options');
            optDiv.innerHTML = '';
            
            poll.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'vote-btn';
                btn.innerText = `${opt.name}`;
                btn.onclick = () => { socket.emit('oy_ver', opt.id); btn.disabled = true; btn.style.opacity = '0.5'; };
                optDiv.appendChild(btn);
            });
        });

        // --- ADMIN FONKSİYONLARI ---
        function toggleAdmin() {
            const modal = document.getElementById('admin-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function updateWaitingMsg() {
            const msg = document.getElementById('new-waiting-msg').value;
            socket.emit('bekleme_mesaji_degistir', msg);
        }

        function renderAnketSecimi() {
            // Admin burada db içindeki şarkılardan seçim yapıp 'anket_yayinla' emit eder
            // Bu kısım Repertuar Düzenle menüsüne entegre edilebilir.
            alert("Şarkı seçimi menüsü açılıyor...");
        }
    </script>
</body>
</html>
