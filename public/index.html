<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .waiting-line { transition: all 0.5s ease; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* LIVE Animasyonu */
        #live-indicator { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.2rem; z-index: 1001; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Admin & Drawer */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }

        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1rem; }
        .action-btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-indicator"><i class="fas fa-circle"></i> LIVE</div>

    <div class="content">
        <div id="v1" class="waiting-line"></div>
        <div id="v2" class="waiting-line"></div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">Istek Portal - Yönetim</h3>
            
            <div id="pre-scene-btns">
                <button class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            </div>

            <div id="active-scene-btns" style="display:none;">
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left: 5px solid var(--danger);">Sahne Bitir <i class="fas fa-stop"></i></button>
                <button class="admin-main-btn" onclick="alert('Oylama ekranı yakında!')">Oylama Oluştur <i class="fas fa-poll"></i></button>
                <button class="admin-main-btn" onclick="alert('Sonuçlar yakında!')">Sonuç İzle <i class="fas fa-chart-bar"></i></button>
            </div>

            <button class="action-btn" style="background:var(--danger); margin-top:30px;" onclick="location.reload()">KAPAT</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı</h3>
            <div style="background:var(--input-bg); padding:15px; border-radius:12px;">
                <input type="text" id="i1" class="admin-input" placeholder="Satır 1">
                <input type="text" id="i2" class="admin-input" placeholder="Satır 2">
            </div>
            <button class="action-btn" style="background:var(--success);" onclick="pubWait()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar</h3>
            <button class="admin-main-btn" onclick="alert('Kategori listesi yüklendi')">Kategoriler/Şarkılar <i class="fas fa-list"></i></button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let sceneActive = false;
        let lastUserMsg = { line1: '', line2: '' };

        socket.on('init_data', d => { 
            // Veri senkronizasyonu
        });

        socket.on('bekleme_mesaji_guncelle', d => {
            document.getElementById('v1').innerText = d.line1;
            document.getElementById('v2').innerText = d.line2;
            document.getElementById('v1').style.fontSize = d.size1 || '1.5rem';
            document.getElementById('v2').style.fontSize = d.size2 || '1.5rem';
            document.getElementById('v1').style.textAlign = d.align1 || 'center';
            document.getElementById('v2').style.textAlign = d.align2 || 'center';
        });

        socket.on('sahne_durumu_guncelle', isActive => {
            sceneActive = isActive;
            toggleSceneUI(isActive);
        });

        function toggleSceneUI(active) {
            const pre = document.getElementById('pre-scene-btns');
            const act = document.getElementById('active-scene-btns');
            const live = document.getElementById('live-indicator');
            
            if(active) {
                pre.style.display = 'none';
                act.style.display = 'flex';
                act.style.flexDirection = 'column';
                act.style.gap = '12px';
                live.style.display = 'block';
            } else {
                pre.style.display = 'flex';
                pre.style.flexDirection = 'column';
                pre.style.gap = '12px';
                act.style.display = 'none';
                live.style.display = 'none';
            }
        }

        // SAHNE BAŞLATMA
        function askStartScene() {
            openDrawer(`
                <h3 style="color:var(--success)">Sahne Başlatılsın mı?</h3>
                <p>Ekranda otomatik olarak bilgilendirme mesajı yayınlanacaktır.</p>
                <button class="action-btn" style="background:var(--success)" onclick="confirmStartScene()">EVET, BAŞLAT</button>
                <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="closeDrawer()">İPTAL</button>
            `);
        }

        function confirmStartScene() {
            // Mevcut metni yedekle (Sahne bitince geri dönmek için)
            lastUserMsg.line1 = document.getElementById('v1').innerText;
            lastUserMsg.line2 = document.getElementById('v2').innerText;

            socket.emit('sahne_durumu_degistir', true);
            socket.emit('bekleme_mesaji_degistir', {
                line1: "BİR SONRAKİ OYLAMAYA KADAR",
                line2: "MÜZİĞİN KEYFİNİ ÇIKAR",
                align1: 'center', align2: 'center', size1: '1.5rem', size2: '1.5rem'
            });
            closeDrawer();
        }

        // SAHNE BİTİRME
        function askEndScene() {
            openDrawer(`
                <h4 style="color:var(--danger)">Sahneyi Bitir</h4>
                <input type="password" id="end-pw" class="admin-input" placeholder="Şifre Giriniz">
                <button class="action-btn" style="background:var(--danger)" onclick="confirmEndScene()">SAHNEYİ KAPAT</button>
            `);
            setTimeout(() => document.getElementById('end-pw').focus(), 100);
        }

        function confirmEndScene() {
            if(document.getElementById('end-pw').value === "1167") {
                socket.emit('sahne_durumu_degistir', false);
                // Eski mesajı geri yükle
                socket.emit('bekleme_mesaji_degistir', {
                    line1: lastUserMsg.line1,
                    line2: lastUserMsg.line2,
                    align1: 'center', align2: 'center', size1: '1.5rem', size2: '1.5rem'
                });
                closeDrawer();
            } else { alert("Şifre Hatalı!"); }
        }

        function pubWait() {
            socket.emit('bekleme_mesaji_degistir', {
                line1: document.getElementById('i1').value,
                line2: document.getElementById('i2').value,
                align1: 'center', align2: 'center', size1: '1.5rem', size2: '1.5rem'
            });
            alert("Yayınlandı!");
        }

        // Drawer & Auth
        function openDrawer(html) {
            document.getElementById('drawer-content').innerHTML = html;
            document.getElementById('main-drawer').classList.add('active');
            document.getElementById('drawer-bg').classList.add('active');
        }
        function closeDrawer() {
            document.getElementById('main-drawer').classList.remove('active');
            document.getElementById('drawer-bg').classList.remove('active');
        }
        function showAuthDrawer() {
            openDrawer(`<h4>Yönetici Girişi</h4><input type="password" id="admin-pw" class="admin-input" placeholder="Şifre"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`);
        }
        function checkAuth() {
            if(document.getElementById('admin-pw').value === "1167") {
                closeDrawer();
                document.getElementById('admin-portal').style.display = 'block';
            } else { alert("Hatalı!"); }
        }
        function openPage(id) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
