<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .waiting-line { transition: opacity 0.5s ease, transform 0.5s ease; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        
        /* Android / Mobil Buton Sabitleme */
        .admin-main-btn { 
            background: var(--input-bg); 
            border: 1px solid #374151; 
            color: white; 
            padding: 18px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            text-decoration: none; 
            font-size: 1.1rem; 
            width: 100%; 
            margin-bottom: 12px; 
            box-sizing: border-box;
            min-height: 65px;
            flex-shrink: 0;
        }

        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }

        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; flex-shrink: 0; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        
        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 12px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid #374151; }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <div id="v1" class="waiting-line"></div>
        <div id="v2" class="waiting-line"></div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center; margin-bottom: 25px;">Istek Portal - Yönetim</h3>
            
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">
                Sahne Başlat <i class="fas fa-play"></i>
            </button>

            <div id="standard-menu">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">
                    Repertuar Düzenle <i class="fas fa-music"></i>
                </button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">
                    Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i>
                </button>
            </div>

            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="document.getElementById('admin-portal').style.display='none'">PANELİ KAPAT</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar Yönetimi</h3>
            <button class="admin-main-btn" onclick="openPage('p-cats')">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-songs')">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-cats" class="admin-page">
            <h3>Kategoriler</h3>
            <button class="admin-main-btn" onclick="showNewCatDrawer()">Yeni Kategori <i class="fas fa-plus"></i></button>
            <div id="cat-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>

        <div id="p-songs" class="admin-page">
            <h3>Tüm Şarkılar</h3>
            <button class="admin-main-btn" onclick="showNewSongDrawer()">Yeni Şarkı Ekle <i class="fas fa-plus"></i></button>
            <div id="song-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [] };

        socket.on('init_data', d => { db = d; renderAll(); });

        function showAuthDrawer() { 
            openDrawer(`<h4>Yönetici Girişi</h4><input type="password" id="admin-pw" class="admin-input" placeholder="Şifre"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`); 
            setTimeout(() => document.getElementById('admin-pw').focus(), 200);
        }

        function checkAuth() {
            if(document.getElementById('admin-pw').value === "1167") {
                closeDrawer();
                document.getElementById('admin-portal').style.display = 'block';
            } else { alert("Hatalı Şifre!"); }
        }

        function renderAll() {
            // Kategoriler
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return `<div class="cat-box">
                    <button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} (${songs.length}) <i class="fas fa-chevron-down"></i></button>
                    <div class="cat-songs">
                        <button class="action-btn" style="background:var(--primary); font-size:0.8rem; margin-bottom:10px;" onclick="showAddSongToCatDrawer(${c.id})">Boştaki Şarkıları Ekle</button>
                        ${songs.map(s => `<div class="list-item"><span>${s.name}</span><i class="fas fa-minus-circle" style="color:var(--danger); cursor:pointer;" onclick="updateSongCat(${s.id}, null)"></i></div>`).join('')}
                    </div>
                </div>`;
            }).join('');

            // Tüm Şarkılar
            document.getElementById('song-list-cont').innerHTML = db.songs.map(s => `
                <div class="list-item">
                    <span>${s.name} ${s.catId ? '<small style="color:#6b7280">(Dolu)</small>' : '<small style="color:var(--success)">(Boşta)</small>'}</span>
                    <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="askDelSong(${s.id})"></i>
                </div>
            `).join('');
        }

        function showAddSongToCatDrawer(catId) {
            const freeSongs = db.songs.filter(s => !s.catId);
            let html = `<h4>Boştaki Şarkılar</h4><div style="max-height:300px; overflow-y:auto;">`;
            if(freeSongs.length === 0) {
                html += `<p style="text-align:center; color:#9ca3af;">Atanacak boşta şarkı yok.</p>`;
            } else {
                html += freeSongs.map(s => `<div class="list-item"><span>${s.name}</span><i class="fas fa-plus-circle" style="color:var(--success); cursor:pointer;" onclick="updateSongCat(${s.id}, ${catId})"></i></div>`).join('');
            }
            html += `</div>`;
            openDrawer(html);
        }

        function updateSongCat(sId, cId) {
            const song = db.songs.find(x => x.id == sId);
            if(song) {
                song.catId = cId;
                socket.emit('db_update', db);
                closeDrawer();
            }
        }

        function askStartScene() {
            openDrawer(`<h4>Sahne Başlatılsın mı?</h4><button class="action-btn" style="background:var(--success)" onclick="socket.emit('sahne_durumu_degistir', true);closeDrawer();">EVET, BAŞLAT</button>`);
        }

        function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showNewSongDrawer() { openDrawer(`<h4>Yeni Şarkı</h4><input type="text" id="ns-name" class="admin-input"><button class="action-btn" style="background:var(--success)" onclick="saveSong()">KAYDET</button>`); }
        function saveSong() { const n = document.getElementById('ns-name').value; if(n) { db.songs.push({id: Date.now(), name: n, catId: null}); socket.emit('db_update', db); closeDrawer(); } }
        function showNewCatDrawer() { openDrawer(`<h4>Yeni Kategori</h4><input type="text" id="nc-name" class="admin-input"><button class="action-btn" style="background:var(--success)" onclick="saveCat()">KAYDET</button>`); }
        function saveCat() { const n = document.getElementById('nc-name').value; if(n) { db.categories.push({id: Date.now(), name: n}); socket.emit('db_update', db); closeDrawer(); } }
        function askDelSong(id) { openDrawer(`<h4>Silinsin mi?</h4><button class="action-btn" style="background:var(--danger)" onclick="db.songs=db.songs.filter(s=>s.id!==${id});socket.emit('db_update',db);closeDrawer();">EVET, SİL</button>`); }
    </script>
</body>
</html>
