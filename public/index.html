<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        
        /* Kullanıcı Ekranı Alanları */
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }
        
        /* Canlı Anket Kartları */
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; font-size: 1.2rem; font-weight: bold; }
        .poll-card:active { transform: scale(0.95); background: var(--primary); }

        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.4rem; z-index: 1001; animation: blinker 1s linear infinite; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Admin Panel Stilleri (Aynı Kaldı) */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; width: 100%; margin-bottom: 12px; }
        .admin-main-btn:disabled { opacity: 0.5; filter: grayscale(1); }
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 2000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999; }
        .drawer-overlay.active { display: block; }
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 12px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid #374151; }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>

    <div class="content">
        <div id="waiting-area" style="width:100%">
            <div id="v1" class="waiting-line"></div>
            <div id="v2" class="waiting-line"></div>
        </div>

        <div id="poll-view">
            <h2 id="poll-title">Sıradaki Şarkıyı Seç!</h2>
            <div id="poll-options-list"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center;">İstek Portal Yönetim</h3>
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">Sahne Başlat <i class="fas fa-play"></i></button>
            <div id="active-scene-controls" style="display:none; flex-direction:column; width:100%;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background: var(--primary);">Oylama Oluştur <i class="fas fa-poll-h"></i></button>
                <button class="admin-main-btn" onclick="alert('Yakında!')" style="background: var(--primary);">Sonuç İzle <i class="fas fa-chart-line"></i></button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left: 5px solid var(--danger); margin-top: 10px;">Sahne Bitir <i class="fas fa-stop"></i></button>
            </div>
            <div id="standard-menu">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            </div>
            <button class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-poll-create" class="admin-page">
            <h3>Şarkı Seçimi</h3>
            <div id="poll-selection-cont"></div>
            <button class="action-btn" style="background:var(--success); margin-top:20px;" onclick="sendPoll()">ANKETİ BAŞLAT</button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>
        
        <div id="p-waiting" class="admin-page"><h3>Düzenle</h3><button class="action-btn" onclick="openPage('p-main')">GERİ</button></div>
        <div id="p-repertuar" class="admin-page"><h3>Repertuar</h3><button class="action-btn" onclick="openPage('p-main')">GERİ</button></div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, activePoll: null };

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });

        // KRİTİK NOKTA: Sinyal Geldiğinde Ekranı Değiştir
        socket.on('start_poll', pollData => {
            db.activePoll = pollData;
            showPollToUser(pollData);
        });

        socket.on('bekleme_mesaji_guncelle', d => {
            if(!db.activePoll) { // Eğer anket yoksa mesajı göster
                document.getElementById('v1').innerText = d.line1;
                document.getElementById('v2').innerText = d.line2;
            }
        });

        function showPollToUser(poll) {
            document.getElementById('waiting-area').style.display = 'none';
            const pollView = document.getElementById('poll-view');
            pollView.style.display = 'flex';
            
            const list = document.getElementById('poll-options-list');
            list.innerHTML = poll.options.map(opt => `
                <div class="poll-card" onclick="castVote('${opt.id}')">
                    ${opt.name}
                </div>
            `).join('');
        }

        function castVote(songId) {
            // Kullanıcı oy verdiğinde sunucuya gönder
            socket.emit('submit_vote', songId);
            document.getElementById('poll-view').innerHTML = `<h2>Oyun Alındı!</h2><p>Lütfen sahneyi izlemeye devam edin.</p>`;
            setTimeout(() => {
                // Kısa süre sonra anketi kapatıp bekleme ekranına dönebilir veya sonucu bekleyebilir
            }, 3000);
        }

        function sendPoll() {
            const selected = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({
                id: cb.value, name: cb.getAttribute('data-name'), votes: 0
            }));

            if(selected.length < 2) return alert("En az 2 şarkı!");

            const pollData = { options: selected, id: Date.now() };
            socket.emit('db_update', { ...db, activePoll: pollData });
            socket.emit('start_poll', pollData); // Tüm istemcilere anket sinyali gönder

            alert("Anket Başlatıldı!");
            openPage('p-main');
        }

        function updateUIState() {
            const isLive = db.sceneActive;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            
            // Eğer sayfa yenilendiğinde aktif bir anket varsa onu göster
            if(db.activePoll) showPollToUser(db.activePoll);
        }

        function renderAll() {
            // Admin Seçim Listesi
            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} <i class="fas fa-chevron-down"></i></button><div class="cat-songs">${songs.map(s => `<div class="list-item"><span>${s.name}</span><input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}"></div>`).join('')}</div></div>`;
            }).join('');
        }

        // Admin Yardımcı Fonksiyonlar
        function showAuthDrawer() { openDrawer(`<h4>Giriş</h4><input type="password" id="admin-pw" class="admin-input"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`); }
        function checkAuth() { if(document.getElementById('admin-pw').value === "1167") { closeDrawer(); document.getElementById('admin-portal').style.display = 'block'; } }
        function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
        function askStartScene() { openDrawer(`<h4>Sahne Başlat?</h4><button class="action-btn" style="background:var(--success)" onclick="db.sceneActive=true;socket.emit('db_update',db);updateUIState();closeDrawer();">BAŞLAT</button>`); }
        function askEndScene() { openDrawer(`<h4>Bitir?</h4><input type="password" id="end-pw" class="admin-input"><button class="action-btn" style="background:var(--danger)" onclick="if(document.getElementById('end-pw').value==='1167'){db.sceneActive=false;db.activePoll=null;socket.emit('db_update',db);location.reload();}">BİTİR</button>`); }
    </script>
</body>
</html>
