<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hızlı Anket - Canlı Sahne</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --primary:#38bdf8; --success:#22c55e; --danger:#ef4444; --text:#f8fafc; }
    body {
      background: var(--bg) url('image1.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      font-family:'Segoe UI',sans-serif;
      margin:0;
    }
    .container { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
    #status { font-size:1.2rem; text-align:center; margin-top:50px; color:var(--primary); display:none; }
    .menu-btn { width:100%; max-width:300px; padding:15px; margin:10px 0; border:none; border-radius:12px; background:var(--card); color:white; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:10px; justify-content:center; }
    .layer {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(15,23,42,0.85);
      backdrop-filter: blur(8px);
      padding:20px;
      z-index:100;
      overflow-y:auto;
      border-radius:12px;
    }
    #message-panel {
      display:none;
      margin-top:10px;
      background:var(--card);
      padding:15px;
      border-radius:10px;
    }
    #msg-input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }
    /* Çark simgesi */
    #settings-icon {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 1.8rem;
      color: var(--primary);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #settings-icon:hover {
      transform: rotate(90deg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="status"></div>
    <div id="options" style="width:100%; max-width:400px; margin-top:30px;"></div>
  </div>

  <!-- Sağ üstte çark simgesi -->
  <i id="settings-icon" class="fas fa-cog" onclick="openAdmin()"></i>

  <div id="layer-admin" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeAdmin()"></i><h2>ADMİN PANELİ</h2></div>
    <button id="btn-start" class="menu-btn" style="background:var(--success)" onclick="startScene()">
      <i class="fas fa-microphone"></i> SAHNEYİ BAŞLAT
    </button>
    <button id="btn-stop" class="menu-btn" style="background:var(--danger); display:none;" onclick="stopScene()">
      <i class="fas fa-stop"></i> SAHNEYİ BİTİR
    </button>
    
    <!-- Mesaj Paneli -->
    <button class="menu-btn" onclick="toggleMessagePanel()">
      <i class="fas fa-edit"></i> MESAJI GÜNCELLE
    </button>
    <div id="message-panel">
      <input type="text" id="msg-input" placeholder="Bekleme mesajı yaz">
      <button class="menu-btn" style="background:var(--primary)" onclick="publishMessage()">
        <i class="fas fa-paper-plane"></i> YAYINLA
      </button>
    </div>

    <button class="menu-btn" onclick="renderCategories()">
      <i class="fas fa-music"></i> REPERTUAR DÜZENLE
    </button>
  </div>

  <div id="layer-cats" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeLayer('layer-cats')"></i><h2>REPERTUAR</h2></div>
    <div id="cat-list"></div>
    <input type="text" id="new-cat-name" placeholder="Yeni Kategori Adı">
    <button class="menu-btn" style="background:var(--primary)" onclick="addCategory()">
      <i class="fas fa-plus"></i> KATEGORİ EKLE
    </button>
  </div>

<script>
const socket = io();
let categories = [];
let allSongs = [];
let sceneActive = false;
let isAdmin = false;

// --- Admin panel açma/kapama ---
function openAdmin() {
  const pass = prompt("Admin şifresi:");
  if(pass === "1234") {
    isAdmin = true;
    document.getElementById('layer-admin').style.display = 'block';
  } else {
    alert("Yanlış şifre!");
  }
}
function closeAdmin() {
  document.getElementById('layer-admin').style.display = 'none';
}
function closeLayer(id) {
  document.getElementById(id).style.display = 'none';
}

// --- Mesaj Paneli ---
function toggleMessagePanel() {
  const panel = document.getElementById('message-panel');
  panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
}
document.addEventListener('click', (e) => {
  const panel = document.getElementById('message-panel');
  const btn = document.querySelector('button[onclick="toggleMessagePanel()"]');
  if (panel.style.display === 'block' && !panel.contains(e.target) && e.target !== btn) {
    panel.style.display = 'none';
  }
});
function publishMessage() {
  if(isAdmin) {
    const msg = document.getElementById('msg-input').value;
    socket.emit('bekleme_mesaji_degistir', msg);
    document.getElementById('message-panel').style.display = 'none';
  }
}

// --- Diğer socket ve fonksiyonlar (server.js ile uyumlu) ---
function saveData() { if(isAdmin) socket.emit('update_repertuar', { categories, songs: allSongs }); }
function startScene() { if(isAdmin) socket.emit('sahne_durumu_degistir', true); closeAdmin(); }
function stopScene() { if(isAdmin && confirm("Sahne bitirilsin mi?")) { socket.emit('sahne_durumu_degistir', false); socket.emit('anketi_bitir_sinyali', null); } }
function addCategory() {
  if(!isAdmin) return;
  const name = document.getElementById('new-cat-name').value;
  if(!name) return;
  categories.push({ id: Date.now(), name });
  document.getElementById('new-cat-name').value = '';
  saveData();
  renderCategories();
}
function renderCategories() {
  document.getElementById('layer-cats').style.display = 'block';
  document.getElementById('cat-list').innerHTML = categories.map(c => `
    <div class="cat-item">
      <span>${c.name.toUpperCase()}</span>
      <button class="menu-btn" style="background:var(--danger)" onclick="deleteCat(${c.id})"><i class="fas fa-trash"></i> SİL</button>
    </div>`).join('');
}
function deleteCat(catId) {
  if(!isAdmin) return;
  categories = categories.filter(c => c.id !== catId);
  allSongs = allSongs.map(s => (s.catId === catId ? { ...s, catId:null } : s));
  saveData();
  renderCategories();
}
function sendVote(optionId) {
  socket.emit('oy_ver', optionId);
  document.querySelectorAll('#options .menu-btn').forEach(btn => { btn.disabled=true; btn.style.opacity="0.5"; });
}
</script>
</body>
</html>
