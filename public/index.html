<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Anket Sahne</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: url('image1.png') no-repeat center center fixed;
      background-size: cover;
      color: #f8fafc;
      font-family:'Segoe UI',sans-serif;
      margin:0;
    }
    #status { font-size:1.4rem; text-align:center; margin-top:50px; color:#38bdf8; display:none; }
    .menu-btn {
      width:80%;
      max-width:600px;
      padding:20px;
      margin:20px 0;
      border:none;
      border-radius:16px;
      background:#1e293b;
      color:white;
      font-size:1.4rem;
      font-weight:bold;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:center;
      transition: background 0.3s, transform 0.2s;
    }
    .menu-btn:hover { background:#334155; transform:scale(1.03); }
    .layer {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(15,23,42,0.9);
      backdrop-filter: blur(12px);
      z-index:100;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    #settings-icon {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 1.8rem;
      color: #38bdf8;
      cursor: pointer;
      opacity: 0.1;
      transition: transform 0.2s ease;
    }
    #settings-icon:hover { transform: rotate(90deg); opacity:0.3; }
    #live-indicator {
      position: fixed;
      top: 15px;
      right: 60px;
      font-size: 1.4rem;
      font-weight: bold;
      color: red;
      display:none;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity:0; } }
    #message-panel {
      display:none;
      margin-top:15px;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      width:80%;
      max-width:600px;
    }
    #msg-input {
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
      font-size:1.1rem;
    }
    .toggle-btn {
      display:flex;
      align-items:center;
      justify-content:space-between;
      width:80%;
      max-width:600px;
      font-size:1.3rem;
    }
  </style>
</head>
<body>
  <div id="status"></div>
  <div id="options"></div>

  <i id="settings-icon" class="fas fa-cog" onclick="openAdmin()"></i>
  <div id="live-indicator">LIVE</div>

  <!-- Admin Panel -->
  <div id="layer-admin" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeAdmin()"></i><h2>ADMİN PANELİ</h2></div>
    <button id="btn-start" class="menu-btn" style="background:#22c55e" onclick="startScene()"><i class="fas fa-microphone"></i> SAHNEYİ BAŞLAT</button>
    <button id="btn-stop" class="menu-btn" style="background:#ef4444; display:none;" onclick="stopScene()"><i class="fas fa-stop"></i> SAHNEYİ BİTİR</button>
    <button id="btn-results" class="menu-btn" style="background:#38bdf8; display:none;"><i class="fas fa-chart-bar"></i> SONUÇLAR</button>

    <!-- Bekleme Metni toggle -->
    <div class="toggle-btn menu-btn" onclick="toggleMessagePanel()">
      <span><i class="fas fa-edit"></i> BEKLEME METNİ</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div id="message-panel">
      <input type="text" id="msg-input" placeholder="Bekleme mesajı yaz">
      <button class="menu-btn" style="background:#38bdf8" onclick="publishMessage()"><i class="fas fa-paper-plane"></i> YAYINLA</button>
    </div>

    <button id="btn-repertuar" class="menu-btn" onclick="openRepertuar()"><i class="fas fa-music"></i> REPERTUAR</button
