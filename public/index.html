<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hızlı Anket - Canlı Sahne</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --primary:#38bdf8; --success:#22c55e; --danger:#ef4444; --text:#f8fafc; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
    .container { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
    #status { font-size:1.2rem; text-align:center; margin-top:50px; color:var(--primary); display:none; }
    .menu-btn { width:100%; max-width:300px; padding:15px; margin:10px 0; border:none; border-radius:12px; background:var(--card); color:white; font-weight:bold; cursor:pointer; }
    .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); padding:20px; z-index:100; overflow-y:auto; }
    #message-panel { display:none; margin-top:10px; background:var(--card); padding:15px; border-radius:10px; }
    #msg-input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="margin-top:20px;">CANLI ANKET</h1>
    <div id="status"></div>
    <div id="options" style="width:100%; max-width:400px; margin-top:30px;"></div>
    <button class="menu-btn" onclick="openAdmin()" style="margin-top:auto; opacity:0.3;">PANEL</button>
  </div>

  <div id="layer-admin" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeAdmin()"></i><h2>ADMİN PANELİ</h2></div>
    <button id="btn-start" class="menu-btn" style="background:var(--success)" onclick="startScene()">SAHNEYİ BAŞLAT</button>
    <button id="btn-stop" class="menu-btn" style="background:var(--danger); display:none;" onclick="stopScene()">SAHNEYİ BİTİR</button>
    
    <!-- Mesaj Paneli -->
    <button class="menu-btn" onclick="toggleMessagePanel()">MESAJI GÜNCELLE</button>
    <div id="message-panel">
      <input type="text" id="msg-input" placeholder="Bekleme mesajı yaz">
      <button class="menu-btn" style="background:var(--primary)" onclick="publishMessage()">YAYINLA</button>
    </div>

    <button class="menu-btn" onclick="renderCategories()">REPERTUAR DÜZENLE</button>
  </div>

  <div id="layer-cats" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeLayer('layer-cats')"></i><h2>REPERTUAR</h2></div>
    <div id="cat-list"></div>
    <input type="text" id="new-cat-name" placeholder="Yeni Kategori Adı">
    <button class="menu-btn" style="background:var(--primary)" onclick="addCategory()">KATEGORİ EKLE</button>
  </div>

<script>
const socket = io();
let categories = [];
let allSongs = [];
let sceneActive = false;
let isAdmin = false;

// --- SUNUCU SENKRONİZASYONU ---
socket.on('init_data', (data) => {
  categories = data.categories || [];
  allSongs = data.songs || [];
  if(document.getElementById('layer-cats').style.display === 'block') renderCategories();
});

socket.on('sahne_durumu_guncelle', (isActive) => {
  sceneActive = isActive;
  document.getElementById('status').style.display = isActive ? 'block' : 'none';
  updateAdminUI();
});

socket.on('bekleme_mesaji_guncelle', (msg) => {
  document.getElementById('status').innerText = msg;
});

socket.on('yeni_anket_geldi', (poll) => {
  document.getElementById('status').innerText = poll.title;
  document.getElementById('options').innerHTML = poll.options.map(opt => `
    <button class="menu-btn" onclick="sendVote('${opt.id}')" style="background:var(--primary)">
      ${opt.name.toUpperCase()}
    </button>`).join('');
});

socket.on('oy_guncellendi', (poll) => {
  document.getElementById('options').innerHTML = poll.options.map(opt => `
    <button class="menu-btn" disabled style="background:var(--primary)">
      ${opt.name.toUpperCase()} - ${poll.votes[opt.id]} oy
    </button>`).join('');
});

socket.on('oy_onaylandi', () => alert("Oyunuz kaydedildi!"));
socket.on('oy_reddedildi', (msg) => alert(msg));

socket.on('anket_temizle', (winner) => {
  document.getElementById('options').innerHTML = '';
  if(winner) {
    document.getElementById('status').innerHTML = `<span style="color:var(--success)">KAZANAN</span><br><div style="font-size:2rem">${winner}</div>`;
  }
});

// --- MESAJ PANELİ ---
function toggleMessagePanel() {
  const panel = document.getElementById('message-panel');
  panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
}
document.addEventListener('click', (e) => {
  const panel = document.getElementById('message-panel');
  const btn = document.querySelector('button[onclick="toggleMessagePanel()"]');
  if (panel.style.display === 'block' && !panel.contains(e.target) && e.target !== btn) {
    panel.style.display = 'none';
  }
});
function publishMessage() {
  if(isAdmin) {
    const msg = document.getElementById('msg-input').value;
    socket.emit('bekleme_mesaji_degistir', msg);
    document.getElementById('message-panel').style.display = 'none';
  }
}

// --- FONKSİYONLAR ---
function saveData() { if(isAdmin) socket.emit('update_repertuar', { categories, songs: allSongs }); }
function startScene() { if(isAdmin) socket.emit('sahne_durumu_degistir', true); closeAdmin(); }
function stopScene() { if(isAdmin && confirm("Sahne bitirilsin mi?")) { socket.emit('sahne_durumu_degistir', false); socket.emit('anketi_bitir_sinyali', null); } }

function addCategory() {
  if(!isAdmin) return;
  const name = document.getElementById('new-cat-name').value;
  if(!name) return;
  categories.push({ id: Date.now(), name });
  document.getElementById('new-cat-name').value = '';
  saveData();
  renderCategories();
}

function renderCategories() {
  document.getElementById('layer-cats').style.display = 'block';
  document.getElementById('cat-list').innerHTML = categories.map(c => `
    <div class="cat-item">
      <span>${c.name.toUpperCase()}</span>
      <button class="menu-btn" style="background:var(--danger)" onclick="deleteCat(${c.id})">SİL</button>
    </div>`).join('');
}

function deleteCat(catId) {
  if(!isAdmin) return;
  categories = categories.filter(c => c.id !== catId);
  allSongs = allSongs.map(s => (s.catId === catId ? { ...s, catId:null } : s));
  saveData();
  renderCategories();
}

function sendVote(optionId) {
  socket.emit('oy_ver', optionId);
  document.querySelectorAll('#options .menu-btn').forEach(btn => { btn.disabled=true; btn.style.opacity="0.5"; });
