<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Istek Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000 url('image1.png') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; overflow: hidden; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        
        .content { position: relative; z-index: 10; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .waiting-line { transition: 0.5s; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); width: 100%; }
        
        #poll-view { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; }
        .poll-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; font-size: 1.2rem; font-weight: bold; }
        .poll-card:active { transform: scale(0.95); background: var(--primary); }

        #live-status { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--danger); font-weight: bold; font-size: 1.4rem; z-index: 1001; animation: blinker 1s linear infinite; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Canlı Sonuç Barları (Kullanıcı Tarafı) */
        .user-res-row { margin-bottom: 12px; width: 100%; text-align: left; }
        .user-res-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; }
        .user-res-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        .user-res-fill { height: 100%; background: var(--primary); transition: width 0.5s ease; }

        /* Kazanan Kutlaması */
        #winner-overlay { display: none; position: fixed; inset: 0; background: rgba(79, 70, 229, 0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #winner-overlay h1 { font-size: 3rem; margin: 0; }
        #winner-overlay p { font-size: 1.5rem; margin-top: 10px; }

        /* Admin Paneli */
        #admin-portal { display: none; position: fixed; inset: 0; background: var(--panel-bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-page { display: none; flex-direction: column; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .admin-page.active { display: flex; }
        .admin-main-btn { background: var(--input-bg); border: 1px solid #374151; color: white; padding: 18px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; width: 100%; margin-bottom: 12px; min-height: 65px; }
        .admin-main-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .res-row { margin-bottom: 20px; }
        .res-bar-bg { background: #374151; height: 26px; border-radius: 13px; margin-top: 8px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .res-bar-fill { background: linear-gradient(90deg, var(--primary), #818cf8); height: 100%; transition: width 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; }
        .res-label { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 600; padding: 0 5px; }

        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; z-index: 3000; padding: 25px; box-sizing: border-box; border-radius: 24px 24px 0 0; transition: 0.4s; border-top: 3px solid var(--primary); }
        .drawer.active { bottom: 0; }
        .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2999; }
        .drawer-overlay.active { display: block; }
        .action-btn { padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .admin-input { background: #0f172a; border: 1px solid #374151; color: white; padding: 14px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .cat-box { background: var(--input-bg); border: 1px solid #374151; border-radius: 10px; margin-bottom: 12px; }
        .cat-btn { width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .cat-songs { display: none; padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid #374151; }
        .cat-songs.active { display: block; }
        .list-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.8rem; }
        .poll-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--success); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="live-status">● LIVE</div>

    <div id="winner-overlay">
        <i class="fas fa-trophy" style="font-size: 4rem; color: gold; margin-bottom: 20px;"></i>
        <h1 id="winner-name">Şarkı Adı</h1>
        <p>En çok oyu alarak seçildi!</p>
    </div>

    <div class="content">
        <div id="waiting-area" style="width:100%">
            <div id="v1" class="waiting-line"></div>
            <div id="v2" class="waiting-line"></div>
        </div>
        <div id="poll-view">
            <h2 id="poll-title-user" style="margin-bottom: 20px;">Sıradaki Şarkıyı Seç!</h2>
            <div id="poll-options-list"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="showAuthDrawer()"><i class="fas fa-cog"></i></button>

    <div id="drawer-bg" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="main-drawer" class="drawer"><div id="drawer-content"></div></div>

    <div id="admin-portal">
        <div id="p-main" class="admin-page active">
            <h3 style="text-align:center; margin-bottom: 25px;">Istek Portal - Yönetim</h3>
            <button id="btn-start-scene" class="admin-main-btn" onclick="askStartScene()" style="border-left: 5px solid var(--success);">
                Sahne Başlat <i class="fas fa-play"></i>
            </button>
            <div id="active-scene-controls" style="display:none; flex-direction:column; width:100%;">
                <button id="btn-create-poll" class="admin-main-btn" onclick="openPage('p-poll-create')" style="background: var(--primary);">
                    Oylama Oluştur <i class="fas fa-poll-h"></i>
                </button>
                <button id="btn-results" class="admin-main-btn" onclick="openPage('p-results')" style="background: var(--primary);">
                    Sonuç İzle <i class="fas fa-chart-line"></i>
                </button>
                <button class="admin-main-btn" onclick="askEndScene()" style="border-left: 5px solid var(--danger); margin-top: 10px;">
                    Sahne Bitir <i class="fas fa-stop"></i>
                </button>
            </div>
            <div id="standard-menu" style="width:100%;">
                <button class="admin-main-btn" onclick="openPage('p-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
                <button class="admin-main-btn" onclick="openPage('p-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            </div>
            <button id="btn-close-panel" class="action-btn" style="background:var(--danger); margin-top:20px;" onclick="closeAdminPanel()">PANELİ KAPAT</button>
        </div>

        <div id="p-results" class="admin-page">
            <h3>Canlı Oylama Sonuçları</h3>
            <div id="results-cont" style="margin-top:20px;"></div>
            <button id="btn-finish-poll" class="action-btn" style="background:var(--success); margin-top:30px; display:none;" onclick="finishPoll()">OYLAMAYI BİTİR VE KAYDET</button>
            
            <div id="poll-history-area" style="margin-top:30px; border-top:1px solid #374151; padding-top:20px;">
                <h4>Sahne Oylama Geçmişi</h4>
                <div id="history-list" style="font-size:0.9rem; color:#9ca3af;"></div>
            </div>
            <button class="action-btn" style="background:var(--input-bg); margin-top:20px;" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-waiting" class="admin-page">
            <h3>Bekleme Ekranı Düzenle</h3>
            <div style="background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:12px;">
                <input type="text" id="i1" class="admin-input" placeholder="Satır 1 Metni">
                <div class="line-tools" id="t1">
                    <i class="fas fa-align-left" onclick="align(1,'left')"></i><i class="fas fa-align-center" onclick="align(1,'center')"></i><i class="fas fa-align-right" onclick="align(1,'right')"></i>
                    <select id="s1" style="background:#0f172a; color:white; border:1px solid #374151; padding:5px; border-radius:4px;"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select>
                </div>
            </div>
            <div style="background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:12px;">
                <input type="text" id="i2" class="admin-input" placeholder="Satır 2 Metni">
                <div class="line-tools" id="t2">
                    <i class="fas fa-align-left" onclick="align(2,'left')"></i><i class="fas fa-align-center" onclick="align(2,'center')"></i><i class="fas fa-align-right" onclick="align(2,'right')"></i>
                    <select id="s2" style="background:#0f172a; color:white; border:1px solid #374151; padding:5px; border-radius:4px;"><option value="1rem">Küçük</option><option value="1.5rem" selected>Normal</option><option value="2.5rem">Büyük</option></select>
                </div>
            </div>
            <button class="action-btn" style="background:var(--success); margin-bottom:10px;" onclick="pubWait()">YAYINLA</button>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-main')">GERİ</button>
        </div>

        <div id="p-repertuar" class="admin-page">
            <h3>Repertuar Yönetimi</h3>
            <button class="admin-main-btn" onclick="openPage('p-cats')">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn" onclick="openPage('p-songs')">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">GERİ</button>
        </div>
        <div id="p-cats" class="admin-page">
            <h3>Kategoriler</h3>
            <button class="admin-main-btn" onclick="showNewCatDrawer()">Yeni Kategori <i class="fas fa-plus"></i></button>
            <div id="cat-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>
        <div id="p-songs" class="admin-page">
            <h3>Tüm Şarkılar</h3>
            <button class="admin-main-btn" onclick="showNewSongDrawer()">Yeni Şarkı Ekle <i class="fas fa-plus"></i></button>
            <div id="song-list-cont" style="margin-top:10px;"></div>
            <button class="action-btn" style="background:var(--input-bg);" onclick="openPage('p-repertuar')">GERİ</button>
        </div>

        <div id="p-poll-create" class="admin-page">
            <h3>Oylama Seçenekleri</h3>
            <input type="text" id="poll-search-input" class="admin-input" placeholder="Şarkı Ara..." onkeyup="filterPollList()">
            <div id="poll-selection-cont" style="margin-top:10px; max-height: 400px; overflow-y: auto;"></div>
            <button class="action-btn" style="background:var(--success); margin-top:20px;" onclick="sendPoll()">ANKETİ BAŞLAT</button>
            <button class="action-btn" style="background:var(--input-bg); margin-top:10px;" onclick="openPage('p-main')">VAZGEÇ</button>
        </div>
    </div>

    <script>
        const socket = io();
        let db = { categories: [], songs: [], sceneActive: false, lastManual: {line1:"", align1:"center", size1:"1.5rem", line2:"", align2:"center", size2:"1.5rem"}, activePoll: null, usedSongs: [], pollHistory: [] };
        let hasVoted = false; // Kullanıcının o anki ankete oy verip vermediği
        let tempAligns = { 1: 'center', 2: 'center' };

        socket.on('init_data', d => { db = d; renderAll(); updateUIState(); });

        socket.on('poll_update', pollData => {
            db.activePoll = pollData;
            if(!pollData) hasVoted = false; // Anket bittiyse oy verme durumunu sıfırla
            if(document.getElementById('p-results').classList.contains('active')) renderResults();
            updateUIState();
            if(hasVoted && pollData) showLiveResultsToUser(); 
        });

        socket.on('celebrate_winner', winner => {
            const overlay = document.getElementById('winner-overlay');
            document.getElementById('winner-name').innerText = winner.name;
            overlay.style.display = 'flex';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                hasVoted = false;
            }, 10000);
        });

        socket.on('bekleme_mesaji_guncelle', d => {
            document.getElementById('v1').innerText = d.line1; document.getElementById('v1').style.textAlign = d.align1; document.getElementById('v1').style.fontSize = d.size1;
            document.getElementById('v2').innerText = d.line2; document.getElementById('v2').style.textAlign = d.align2; document.getElementById('v2').style.fontSize = d.size2;
            if(!db.sceneActive) db.lastManual = d;
        });

        function updateUIState() {
            const isLive = db.sceneActive;
            const hasPoll = db.activePoll !== null;
            document.getElementById('live-status').style.display = isLive ? 'block' : 'none';
            document.getElementById('btn-start-scene').style.display = isLive ? 'none' : 'flex';
            document.getElementById('standard-menu').style.display = isLive ? 'none' : 'block';
            document.getElementById('active-scene-controls').style.display = isLive ? 'flex' : 'none';
            document.getElementById('btn-close-panel').style.visibility = isLive ? 'hidden' : 'visible';
            
            if(hasPoll) {
                document.getElementById('btn-create-poll').innerHTML = `Anket Yayında <i class="fas fa-spinner fa-spin"></i>`;
                if(!hasVoted) showPollToUser(db.activePoll);
            } else {
                document.getElementById('btn-create-poll').innerHTML = `Oylama Oluştur <i class="fas fa-poll-h"></i>`;
                document.getElementById('poll-view').style.display = 'none';
                document.getElementById('waiting-area').style.display = 'block';
            }
        }

        // Kullanıcıya anketi göster
        function showPollToUser(poll) {
            document.getElementById('waiting-area').style.display = 'none';
            document.getElementById('poll-view').style.display = 'flex';
            document.getElementById('poll-title-user').innerText = "Sıradaki Şarkıyı Seç!";
            document.getElementById('poll-options-list').innerHTML = poll.options.map(opt => `<div class="poll-card" onclick="castVote('${opt.id}')">${opt.name}</div>`).join('');
        }

        // Oy verme işlemi
        function castVote(sId) {
            socket.emit('submit_vote', sId);
            hasVoted = true;
            showLiveResultsToUser();
        }

        // Kullanıcı ekranında canlı sonuçları göster
        function showLiveResultsToUser() {
            if(!db.activePoll) return;
            document.getElementById('poll-title-user').innerText = "Canlı Sonuçlar";
            const total = db.activePoll.options.reduce((a, b) => a + (Number(b.votes) || 0), 0);
            document.getElementById('poll-options-list').innerHTML = db.activePoll.options.map(opt => {
                const v = Number(opt.votes) || 0;
                const perc = total > 0 ? Math.round((v / total) * 100) : 0;
                return `<div class="user-res-row">
                    <div class="user-res-label"><span>${opt.name}</span><span>%${perc}</span></div>
                    <div class="user-res-bar"><div class="user-res-fill" style="width:${perc}%"></div></div>
                </div>`;
            }).join('') + `<p style="font-size:0.8rem; opacity:0.5; margin-top:15px;">Anket bitince kazanan şarkı duyurulacaktır.</p>`;
        }

        function renderResults() {
            const cont = document.getElementById('results-cont');
            const finishBtn = document.getElementById('btn-finish-poll');
            document.getElementById('history-list').innerHTML = db.pollHistory && db.pollHistory.length > 0 
                ? db.pollHistory.map(h => `<div>• ${h.name} (${h.votes} Oy)</div>`).reverse().join('') : "Henüz oylama yapılmadı.";

            if(!db.activePoll) { cont.innerHTML = "Aktif oylama yok."; finishBtn.style.display = 'none'; return; }
            finishBtn.style.display = 'block';
            const total = db.activePoll.options.reduce((a, b) => a + (Number(b.votes) || 0), 0);
            cont.innerHTML = `<div style="text-align:center; color:var(--success); font-weight:bold; margin-bottom:15px;">TOPLAM OY: ${total}</div>` +
            db.activePoll.options.map(opt => {
                const v = Number(opt.votes) || 0;
                const perc = total > 0 ? Math.round((v / total) * 100) : 0;
                return `<div class="res-row"><div class="res-label"><span>${opt.name}</span><span>${v} Oy (%${perc})</span></div><div class="res-bar-bg"><div class="res-bar-fill" style="width:${perc}%"></div></div></div>`;
            }).join('');
        }

        function finishPoll() { 
            if(!db.activePoll) return;
            const winner = [...db.activePoll.options].sort((a,b) => b.votes - a.votes)[0];
            socket.emit('finish_poll_event', winner); // Kutlama mesajı tetikle
            
            if(!db.usedSongs) db.usedSongs = [];
            if(!db.pollHistory) db.pollHistory = [];
            db.usedSongs.push(winner.id);
            db.pollHistory.push({ name: winner.name, votes: winner.votes });
            db.activePoll = null; 
            socket.emit('db_update', db); 
            openPage('p-main'); 
        }

        function filterPollList() {
            const term = document.getElementById('poll-search-input').value.toLowerCase();
            document.querySelectorAll('#poll-selection-cont .list-item').forEach(item => {
                const name = item.querySelector('span').innerText.toLowerCase();
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        }

        function renderAll() {
            // Repertuar ve Kategori Render (Aynı kalıyor)
            document.getElementById('cat-list-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                return `<div class="cat-box"><button class="cat-btn" onclick="this.nextElementSibling.classList.toggle('active')">${c.name} (${songs.length}) <i class="fas fa-chevron-down"></i></button><div class="cat-songs"><div style="display:flex; gap:10px; margin-bottom:10px;"><button class="action-btn" style="background:var(--primary); font-size:0.8rem;" onclick="showAddSongToCatDrawer(${c.id})">Ekle</button><button class="action-btn" style="background:var(--danger); font-size:0.8rem;" onclick="askDelCat(${c.id},'${c.name}')">Sil</button></div>${songs.map(s => `<div class="list-item"><span>${s.name}</span><i class="fas fa-minus-circle" style="color:var(--danger); cursor:pointer;" onclick="assignToCat(${s.id}, null)"></i></div>`).join('')}</div></div>`;
            }).join('');
            
            document.getElementById('song-list-cont').innerHTML = db.songs.map(s => {
                let opts = db.categories.map(c => `<option value="${c.id}" ${s.catId == c.id ? 'selected' : ''}>${c.name}</option>`).join('');
                return `<div class="list-item"><span style="flex:1">${s.name}</span><select style="background:#0f172a; color:white; border:1px solid #374151; padding:5px; border-radius:4px;" onchange="assignToCat(${s.id}, this.value)"><option value="">-</option>${opts}</select><i class="fas fa-trash" style="color:var(--danger); margin-left:12px; cursor:pointer;" onclick="askDelSong(${s.id})"></i></div>`;
            }).join('');

            document.getElementById('poll-selection-cont').innerHTML = db.categories.map(c => {
                const songs = db.songs.filter(s => s.catId == c.id);
                if(songs.length === 0) return '';
                return `<div class="cat-box"><div class="cat-btn">${c.name}</div><div class="cat-songs active">${songs.map(s => {
                    const isUsed = db.usedSongs && db.usedSongs.includes(s.id);
                    return `<div class="list-item" style="${isUsed ? 'opacity:0.5' : ''}">
                        <span>${s.name} ${isUsed ? ' (Söylendi)' : ''}</span>
                        <input type="checkbox" class="poll-checkbox" value="${s.id}" data-name="${s.name}" ${isUsed ? 'disabled' : ''}>
                    </div>`;
                }).join('')}</div></div>`;
            }).join('');
        }

        function align(l, t) { tempAligns[l] = t; }
        function pubWait() { socket.emit('bekleme_mesaji_degistir', { line1: document.getElementById('i1').value, align1: tempAligns[1], size1: document.getElementById('s1').value, line2: document.getElementById('i2').value, align2: tempAligns[2], size2: document.getElementById('s2').value }); }
        
        // Admin Yardımcıları
        function showNewCatDrawer() { openDrawer(`<h4>Yeni Kategori</h4><input type="text" id="nc-name" class="admin-input"><button class="action-btn" style="background:var(--success)" onclick="saveCat()">KAYDET</button>`); }
        function saveCat() { const n = document.getElementById('nc-name').value; if(n) { db.categories.push({id: Date.now(), name: n}); socket.emit('db_update', db); closeDrawer(); } }
        function showNewSongDrawer() { openDrawer(`<h4>Yeni Şarkı</h4><input type="text" id="ns-name" class="admin-input"><button class="action-btn" style="background:var(--success)" onclick="saveSong()">KAYDET</button>`); }
        function saveSong() { const n = document.getElementById('ns-name').value; if(n) { db.songs.push({id: Date.now(), name: n, catId: null}); socket.emit('db_update', db); closeDrawer(); } }
        function askDelCat(id, name) { openDrawer(`<h4>"${name}" Silinsin mi?</h4><button class="action-btn" style="background:var(--danger)" onclick="confirmDelCat(${id})">EVET, SİL</button>`); }
        function confirmDelCat(id) { db.categories = db.categories.filter(c => c.id !== id); socket.emit('db_update', db); closeDrawer(); }
        function askDelSong(id) { openDrawer(`<h4>Silinsin mi?</h4><button class="action-btn" style="background:var(--danger)" onclick="db.songs=db.songs.filter(s=>s.id!==${id});socket.emit('db_update',db);closeDrawer();">SİL</button>`); }
        function assignToCat(sId, cId) { db.songs.find(x => x.id == sId).catId = cId ? parseInt(cId) : null; socket.emit('db_update', db); }
        function showAddSongToCatDrawer(catId) { const freeSongs = db.songs.filter(s => !s.catId); let html = `<h4>Boştaki Şarkılar</h4>`; html += freeSongs.map(s => `<div class="list-item"><span>${s.name}</span><i class="fas fa-plus-circle" onclick="assignToCat(${s.id}, ${catId}); closeDrawer();"></i></div>`).join(''); openDrawer(html); }

        function sendPoll() {
            const sel = Array.from(document.querySelectorAll('.poll-checkbox:checked')).map(cb => ({ id: isNaN(cb.value) ? cb.value : parseInt(cb.value), name: cb.getAttribute('data-name'), votes: 0 }));
            if(sel.length < 2) return alert("En az 2 şarkı seç!");
            db.activePoll = { options: sel, id: Date.now() };
            socket.emit('db_update', db); socket.emit('start_poll', db.activePoll); openPage('p-main');
        }

        function askStartScene() { openDrawer(`<h4>Sahne Başlat?</h4><button class="action-btn" style="background:var(--success)" onclick="confirmStartScene()">BAŞLAT</button>`); }
        function confirmStartScene() { db.sceneActive = true; db.usedSongs = []; db.pollHistory = []; socket.emit('db_update', db); closeDrawer(); socket.emit('bekleme_mesaji_degistir', {line1:'SIRADAKİ OYLAMAYA KADAR', align1:'center', size1:'1.5rem', line2:'MÜZİĞİN KEYFİNİ ÇIKAR', align2:'center', size2:'1.5rem'}); }
        function askEndScene() { openDrawer(`<h4>Sahne Bitir?</h4><input type="password" id="end-pw" class="admin-input"><button class="action-btn" style="background:var(--danger)" onclick="confirmEndScene()">BİTİR</button>`); }
        function confirmEndScene() { if(document.getElementById('end-pw').value === '1167') { db.sceneActive = false; db.activePoll = null; db.usedSongs = []; db.pollHistory = []; socket.emit('db_update', db); socket.emit('bekleme_mesaji_degistir', db.lastManual || {line1:"", line2:""}); closeDrawer(); setTimeout(() => location.reload(), 500); } }

        function showAuthDrawer() { openDrawer(`<h4>Giriş</h4><input type="password" id="admin-pw" class="admin-input"><button class="action-btn" style="background:var(--primary)" onclick="checkAuth()">GİRİŞ</button>`); }
        function checkAuth() { if(document.getElementById('admin-pw').value === "1167") { closeDrawer(); document.getElementById('admin-portal').style.display = 'block'; } else { alert("Hatalı!"); } }
        function openDrawer(html) { document.getElementById('drawer-content').innerHTML = html; document.getElementById('main-drawer').classList.add('active'); document.getElementById('drawer-bg').classList.add('active'); }
        function closeDrawer() { document.getElementById('main-drawer').classList.remove('active'); document.getElementById('drawer-bg').classList.remove('active'); }
        function openPage(id) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id === 'p-results') renderResults(); renderAll(); }
        function closeAdminPanel() { document.getElementById('admin-portal').style.display = 'none'; }
    </script>
</body>
</html>
