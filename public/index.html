<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Etkileşim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
            --panel-bg: #111827; --input-bg: #1f2937;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background: #000 url('image1.png') no-repeat center center fixed; 
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 1; }
        .content { position: relative; z-index: 10; padding: 20px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        
        /* İzleyici Ekranı */
        #waiting-display { transition: all 0.3s; width: 100%; }
        .waiting-line { margin: 5px 0; min-height: 1.2rem; display: block; width: 100%; line-height: 1.2; }
        #poll-display { display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }

        /* Admin Portalı */
        #admin-portal { 
            display: none; position: fixed; inset: 0; background: var(--panel-bg); 
            z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .admin-page { display: none; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .admin-page.active { display: flex; }

        /* Admin Butonları */
        .admin-main-btn {
            background: var(--input-bg); border: 1px solid #374151; color: white;
            padding: 18px; border-radius: 12px; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
        }
        .admin-main-btn:hover { background: #374151; }
        .action-btn { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
        
        /* Bekleme Ekranı Düzenleme */
        .line-edit-box { background: var(--input-bg); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .line-tools { display: flex; gap: 15px; color: #9ca3af; font-size: 1.1rem; border-top: 1px solid #374151; padding-top: 10px; align-items: center; }
        .line-tools i { cursor: pointer; }
        .line-tools i.active { color: var(--success); }
        .punto-select { background: #111827; color: white; border: 1px solid #374151; border-radius: 4px; padding: 2px 5px; font-size: 0.8rem; }
        .admin-input { background: transparent; border: none; color: white; font-size: 1.1rem; width: 100%; outline: none; }

        /* Saydam Çark */
        #admin-trigger { position: fixed; top: 15px; right: 15px; z-index: 100; opacity: 0.1; background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="content">
        <div id="waiting-display">
            <div id="line1-view" class="waiting-line"></div>
            <div id="line2-view" class="waiting-line"></div>
        </div>
        <div id="poll-display">
            <h2 id="poll-question">Hangi Şarkıyı Çalalım?</h2>
            <div id="poll-options"></div>
        </div>
    </div>

    <button id="admin-trigger" onclick="checkAdminPassword()"><i class="fas fa-cog"></i></button>

    <div id="admin-portal">
        <div id="page-main" class="admin-page active">
            <h3 style="text-align:center; margin-bottom: 20px;"><i class="fas fa-cog"></i> Admin Panel</h3>
            <button class="admin-main-btn" onclick="startScene()">Sahne Başlat <i class="fas fa-play"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-repertuar')">Repertuar Düzenle <i class="fas fa-music"></i></button>
            <button class="admin-main-btn" onclick="openPage('page-waiting')">Bekleme Ekranı Düzenle <i class="fas fa-desktop"></i></button>
            
            <button class="admin-main-btn" style="margin-top:20px;" onclick="closePortal()">
                İzleyici Sayfasına Dön <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <div id="page-waiting" class="admin-page">
            <h3><i class="fas fa-desktop"></i> Bekleme Ekranı</h3>
            
            <div class="line-edit-box">
                <input type="text" id="input-line1" class="admin-input" placeholder="1. Satır metni...">
                <div class="line-tools" id="tools-line1">
                    <i class="fas fa-align-left" onclick="setAlign(1, 'left')"></i>
                    <i class="fas fa-align-center active" onclick="setAlign(1, 'center')"></i>
                    <i class="fas fa-align-right" onclick="setAlign(1, 'right')"></i>
                    <select id="size-line1" class="punto-select" onchange="updateSizePreview(1)">
                        <option value="1rem">Küçük</option>
                        <option value="1.25rem" selected>Normal</option>
                        <option value="1.75rem">Büyük</option>
                        <option value="2.5rem">Dev</option>
                    </select>
                    <i class="fas fa-trash" onclick="clearLine(1)" style="margin-left: auto;"></i>
                </div>
            </div>

            <div class="line-edit-box">
                <input type="text" id="input-line2" class="admin-input" placeholder="2. Satır metni...">
                <div class="line-tools" id="tools-line2">
                    <i class="fas fa-align-left" onclick="setAlign(2, 'left')"></i>
                    <i class="fas fa-align-center active" onclick="setAlign(2, 'center')"></i>
                    <i class="fas fa-align-right" onclick="setAlign(2, 'right')"></i>
                    <select id="size-line2" class="punto-select" onchange="updateSizePreview(2)">
                        <option value="1rem">Küçük</option>
                        <option value="1.25rem" selected>Normal</option>
                        <option value="1.75rem">Büyük</option>
                        <option value="2.5rem">Dev</option>
                    </select>
                    <i class="fas fa-trash" onclick="clearLine(2)" style="margin-left: auto;"></i>
                </div>
            </div>

            <button class="action-btn" style="background: var(--success);" onclick="publishWaiting()">YAYINLA</button>
            <button class="action-btn" style="background: var(--input-bg);" onclick="openPage('page-main')">GERİ</button>
        </div>

        <div id="page-repertuar" class="admin-page">
            <h3><i class="fas fa-music"></i> Repertuar Düzenle</h3>
            <button class="admin-main-btn">Mekan Şablonları <i class="fas fa-building"></i></button>
            <button class="admin-main-btn">Kategoriler <i class="fas fa-list"></i></button>
            <button class="admin-main-btn">Şarkılar <i class="fas fa-microphone"></i></button>
            <button class="action-btn" style="background: var(--input-bg); margin-top:10px;" onclick="openPage('page-main')">GERİ</button>
        </div>
    </div>

    <script>
        const socket = io();
        const ADMIN_PASS = "1167";
        let alignment = { 1: 'center', 2: 'center' };
        let currentSceneState = { line1: '', line2: '', align1: 'center', align2: 'center', size1: '1.25rem', size2: '1.25rem' };

        function openPage(pageId) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Bekleme ekranı sayfası açıldığında mevcut değerleri doldur
            if(pageId === 'page-waiting') {
                document.getElementById('input-line1').value = currentSceneState.line1;
                document.getElementById('input-line2').value = currentSceneState.line2;
                document.getElementById('size-line1').value = currentSceneState.size1;
                document.getElementById('size-line2').value = currentSceneState.size2;
                setAlign(1, currentSceneState.align1);
                setAlign(2, currentSceneState.align2);
            }
        }

        function checkAdminPassword() {
            const pass = prompt("Şifre:");
            if (pass === ADMIN_PASS) {
                document.getElementById('admin-portal').style.display = 'block';
                openPage('page-main');
            }
        }

        function closePortal() { document.getElementById('admin-portal').style.display = 'none'; }

        function setAlign(line, type) {
            alignment[line] = type;
            const tools = document.getElementById(`tools-line${line}`);
            tools.querySelectorAll('i:not(.fa-trash)').forEach(i => i.classList.remove('active'));
            const target = tools.querySelector(`.fa-align-${type}`);
            if(target) target.classList.add('active');
        }

        function clearLine(num) { document.getElementById(`input-line${num}`).value = ''; }

        function publishWaiting() {
            const data = {
                line1: document.getElementById('input-line1').value,
                align1: alignment[1],
                size1: document.getElementById('size-line1').value,
                line2: document.getElementById('input-line2').value,
                align2: alignment[2],
                size2: document.getElementById('size-line2').value
            };
            socket.emit('bekleme_mesaji_degistir', data);
            alert("Yayınlandı!");
        }

        socket.on('bekleme_mesaji_guncelle', (data) => {
            if (typeof data === 'object') {
                currentSceneState = data;
                const l1V = document.getElementById('line1-view');
                const l2V = document.getElementById('line2-view');
                
                l1V.innerText = data.line1 || '';
                l1V.style.textAlign = data.align1 || 'center';
                l1V.style.fontSize = data.size1 || '1.25rem';
                
                l2V.innerText = data.line2 || '';
                l2V.style.textAlign = data.align2 || 'center';
                l2V.style.fontSize = data.size2 || '1.25rem';
                
                document.getElementById('waiting-display').style.display = (data.line1 || data.line2) ? 'block' : 'none';
            }
        });

        function startScene() { alert("Sahne Başlatıldı!"); }
    </script>
</body>
</html>
