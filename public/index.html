<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Anket Sahne</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: url('image1.png') no-repeat center center fixed;
      background-size: cover;
      color: #f8fafc;
      font-family:'Segoe UI',sans-serif;
      margin:0;
    }
    #status { font-size:1.2rem; text-align:center; margin-top:50px; color:#38bdf8; display:none; }
    .menu-btn { width:100%; max-width:300px; padding:15px; margin:10px 0; border:none; border-radius:12px; background:#1e293b; color:white; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:10px; justify-content:center; }
    .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.85); backdrop-filter: blur(8px); padding:20px; z-index:100; overflow-y:auto; border-radius:12px; }
    #settings-icon { position: fixed; top: 15px; right: 15px; font-size: 1.8rem; color: #38bdf8; cursor: pointer; opacity: 0.1; transition: transform 0.2s ease; }
    #settings-icon:hover { transform: rotate(90deg); opacity:0.3; }
    #live-indicator { position: fixed; top: 15px; right: 60px; font-size: 1.2rem; font-weight: bold; color: red; display:none; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity:0; } }
  </style>
</head>
<body>
  <div id="status"></div>
  <div id="options"></div>

  <i id="settings-icon" class="fas fa-cog" onclick="openAdmin()"></i>
  <div id="live-indicator">LIVE</div>

  <div id="layer-admin" class="layer">
    <div><i class="fas fa-arrow-left" onclick="closeAdmin()"></i><h2>ADMİN PANELİ</h2></div>
    <button id="btn-start" class="menu-btn" style="background:#22c55e" onclick="startScene()"><i class="fas fa-microphone"></i> SAHNEYİ BAŞLAT</button>
    <button id="btn-stop" class="menu-btn" style="background:#ef4444; display:none;" onclick="stopScene()"><i class="fas fa-stop"></i> SAHNEYİ BİTİR</button>
    <button id="btn-results" class="menu-btn" style="background:#38bdf8; display:none;"><i class="fas fa-chart-bar"></i> SONUÇLAR</button>
    <button class="menu-btn" onclick="toggleMessagePanel()"><i class="fas fa-edit"></i> BEKLEME METNİ</button>
    <div id="message-panel">
      <input type="text" id="msg-input" placeholder="Bekleme mesajı yaz">
      <button class="menu-btn" style="background:#38bdf8" onclick="publishMessage()"><i class="fas fa-paper-plane"></i> YAYINLA</button>
    </div>
    <button id="btn-repertuar" class="menu-btn" onclick="renderRepertuar()"><i class="fas fa-music"></i> REPERTUAR</button>
  </div>

<script>
const socket = io();
let isAdmin = false;

function openAdmin() {
  const pass = prompt("Admin şifresi:");
  if(pass === "1167") {
    isAdmin = true;
    document.getElementById('layer-admin').style.display = 'block';
  } else {
    alert("Yanlış şifre!");
  }
}

function closeAdmin() {
  document.getElementById('layer-admin').style.display = 'none';
}

function startScene() {
  const pass = prompt("Sahne başlat şifresi:");
  if(pass !== "1167") { alert("Yanlış şifre!"); return; }
  socket.emit('sahne_durumu_degistir', true);
  document.getElementById('status').innerText = "Bir sonraki oylamaya kadar müziğin keyfini çıkar";
  document.getElementById('status').style.display = 'block';
  document.getElementById('btn-repertuar').style.display = 'none';
  document.getElementById('btn-results').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'block';
  document.getElementById('live-indicator').style.display = 'block';
}

function stopScene() {
  const pass = prompt("Sahne bitir şifresi:");
  if(pass !== "1167") { alert("Yanlış şifre!"); return; }
  socket.emit('sahne_durumu_degistir', false);
  socket.emit('anketi_bitir_sinyali', null);
  document.getElementById('status').style.display = 'none';
  document.getElementById('btn-repertuar').style.display = 'block';
  document.getElementById('btn-results').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('live-indicator').style.display = 'none';
}

function toggleMessagePanel() {
  const panel = document.getElementById('message-panel');
  panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
}

function publishMessage() {
  if(isAdmin) {
    const msg = document.getElementById('msg-input').value;
    socket.emit('bekleme_mesaji_degistir', msg);
    document.getElementById('message-panel').style.display = 'none';
  }
}

function renderRepertuar() {
  alert("Repertuar menüsü: Mekan Ayarları, Kategoriler, Şarkılar");
}
</script>
</body>
</html>
