<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceminay Live - Etkileşim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; --dark: #0f172a;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            background: #000 url('image1.png') no-repeat center center fixed; 
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }
        .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.6); z-index: 1; 
        }
        .content { position: relative; z-index: 10; padding: 20px; text-align: center; }
        
        /* Yayın Ekranları */
        #waiting-display { font-size: 2.5rem; margin-top: 20%; font-weight: bold; }
        #poll-display { display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-top: 10%; }
        
        .vote-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: var(--primary); border: none; color: white; border-radius: 8px; font-size: 1.2rem;
        }

        /* Sağ Üst Saydam Admin Butonu */
        #admin-panel { 
            position: fixed; top: 15px; right: 15px; z-index: 100;
        }
        .admin-btn { 
            background: transparent; border: none; color: rgba(255, 255, 255, 0.1); 
            font-size: 1.8rem; cursor: pointer; transition: color 0.3s; 
        }
        .admin-btn:hover { color: rgba(255, 255, 255, 0.4); }
        
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--dark); padding: 20px; border-radius: 10px; z-index: 200; width: 90%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #334155;
        }

        input[type="text"] {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #334155;
            background: #1e293b; color: white; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="content">
        <div id="waiting-display">
            <h2 id="waiting-text"></h2>
        </div>

        <div id="poll-display">
            <h2 id="poll-question">Hangi Şarkıyı Çalalım?</h2>
            <div id="poll-options"></div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="admin-btn" onclick="checkAdminPassword()"><i class="fas fa-cog"></i></button>
    </div>

    <div id="admin-modal" class="modal">
        <h3 style="margin-top:0; color:var(--success)">Yönetim Paneli Active</h3>
        
        <div style="margin-bottom: 20px;">
            <label>Ekrana Metin Gönder:</label>
            <input type="text" id="new-waiting-msg" placeholder="Mesajınızı yazın...">
            <button onclick="updateWaitingMsg()" style="width:100%; margin-top:15px; background: var(--success); color:white; border:none; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">YAYINLA</button>
        </div>

        <div id="repertuar-ozet">
            <button onclick="renderAnketSecimi()" style="width:100%; background: var(--primary); color:white; border:none; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">ANKET BAŞLAT</button>
        </div>
        
        <button onclick="closeAdmin()" style="width:100%; margin-top:20px; background:transparent; color:#94a3b8; border:1px solid #334155; padding:8px; border-radius:5px; cursor:pointer;">KAPAT</button>
    </div>

    <script>
        const socket = io();
        const ADMIN_PASS = "1167";
        let db = { categories: [], songs: [] };

        socket.on('init_data', data => { db = data; });

        // Şifre Kontrolü ve Panel Açılışı
        function checkAdminPassword() {
            const pass = prompt("Yönetici Şifresi:");
            if (pass === ADMIN_PASS) {
                document.getElementById('admin-modal').style.display = 'block';
            } else if (pass !== null) {
                alert("Hatalı Şifre!");
            }
        }

        // MESAJ YAYINI
        socket.on('bekleme_mesaji_guncelle', (msg) => {
            if (msg) {
                document.getElementById('waiting-text').innerText = msg;
                document.getElementById('waiting-display').style.display = 'block';
                document.getElementById('poll-display').style.display = 'none';
            }
        });

        // ANKET YAYINI
        socket.on('anket_guncelle', (poll) => {
            document.getElementById('waiting-display').style.display = 'none';
            document.getElementById('poll-display').style.display = 'block';
            const optDiv = document.getElementById('poll-options');
            optDiv.innerHTML = '';
            
            poll.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'vote-btn';
                btn.innerText = `${opt.name}`;
                btn.onclick = () => { socket.emit('oy_ver', opt.id); btn.disabled = true; btn.style.opacity = '0.5'; };
                optDiv.appendChild(btn);
            });
        });

        function closeAdmin() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        function updateWaitingMsg() {
            const msg = document.getElementById('new-waiting-msg').value;
            if(msg.trim() !== "") {
                socket.emit('bekleme_mesaji_degistir', msg);
                document.getElementById('new-waiting-msg').value = ""; // Inputu temizle
                closeAdmin();
            }
        }

        function renderAnketSecimi() {
            alert("Repertuar Düzenle menüsü aktif ediliyor...");
        }
    </script>
</body>
</html>
